      }
    }, { once: true });
    var fadeInMs = vh.fadeInMs != null ? parseInt(vh.fadeInMs, 10) : 0;
    if (fadeInMs > 0) {
      runVideoHotspotFadeIn(wrap, fadeInMs);
    }
  });
}

function scheduleAttachVideoHotspots(sceneId, sceneData, delayMs) {
  var wait = delayMs != null ? delayMs : 0;
  setTimeout(function() {
    if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
    if (embedPlacerMode) {
      notifyPlacerParentReady();
      if (placerPreviewHotspot) {
        tryApplyPlacerPreviewHotspot();
      } else if (sceneData.videoHotspots && sceneData.videoHotspots[0]) {
        applyPlacerPreviewHotspot(sceneData.videoHotspots[0], sceneId);
      }
      return;
    }
    if (embedShadowMode) {
      notifyShadowParentReady();
      attachShadowPaintLayoutSync();
      if (!window.sceneVideoEls || !window.sceneVideoEls.length) {
        attachVideoHotspots(sceneId, sceneData);
      }
      if (shadowPreviewHotspot) {
        applyShadowPreviewHotspot(shadowPreviewHotspot, sceneId);
      } else if (sceneData.videoHotspots && sceneData.videoHotspots[0]) {
        applyShadowPreviewHotspot(sceneData.videoHotspots[0], sceneId);
      }
      notifyShadowParentReady();
      return;
    }
    attachVideoHotspots(sceneId, sceneData);
  }, wait);
}

// еҮәзҷәең°гӮ·гғјгғіIDгҒ«еұһгҒҷгӮӢ imageHotspots гӮ’е…ЁгӮ·гғјгғігҒӢгӮүеҸҺйӣҶпјҲиӘӨгҒЈгҒҰеҲҘгӮ·гғјгғій…ҚдёӢгҒ«гҒӮгҒЈгҒҰгӮӮиЎЁзӨәпјү
function collectImageHotspotsForScene(sceneId) {
  var list = [];
  data.scenes.forEach(function(sd) {
    if (!sd.imageHotspots) return;
    sd.imageHotspots.forEach(function(ih) {
      var logical = ih.sourceScene || ih.sceneStartId || sd.id;
      if (logical === sceneId) list.push(ih);
    });
  });
  return list;
}

function switchScene(sceneId, yaw, pitch, fov, fromPortalHotspot, keepFullscreenOverlay) {
  if (window.sceneGyro) window.sceneGyro.stop();
  var obj = scenesData[sceneId];
  if (!obj) return;

  console.log('рҹ”ө switchScene: sceneId=' + sceneId + ', yaw=' + (yaw !== undefined ? radToDeg(yaw).toFixed(2) + 'В°' : 'undefined') + ', pitch=' + (pitch !== undefined ? radToDeg(pitch).toFixed(2) + 'В°' : 'undefined'));

  var prevId = currentSceneObj ? currentSceneObj.data.id : null;
  var hadIosGuide = (window.sceneVideoEls || []).some(function(e) {
    return e && e.iosScreenOverlay;
  });
  if (guideDeviceIsIosSafari() && (hadIosGuide || (prevId && sceneHasVideoHotspots(prevId, currentSceneObj.data)))) {
    destroyGuideIosOverlayRoot();
  }
  var oldVideoHandles = [];
  if (prevId && sceneHasVideoHotspots(prevId, currentSceneObj.data)) {
    oldVideoHandles = (window.sceneVideoHotspotHandles || []).slice();
  }
  window.sceneVideoHotspotHandles = [];
  window.sceneVideoEls = [];
  pauseAllSceneVideos(!!keepFullscreenOverlay);
  closeHiResPeekOverlay();
  destroyHiResPeekHotspot();

  if (window.hotspotImages) {
    window.hotspotImages = [];
  }
  for (var key in window) {
    if (key.startsWith('hotspotShown_')) {
      window[key] = false;
    }
  }

  var targetYaw = yaw;
  var targetPitch = pitch;

  if (initialYaw !== null) {
    targetYaw = degToRad(parseFloat(initialYaw));
    initialYaw = null;
  } else if (targetYaw === undefined) {
    targetYaw = obj.data.initialViewParameters?.yaw;
  }

  if (initialPitch !== null) {
    targetPitch = degToRad(parseFloat(initialPitch));
    initialPitch = null;
  } else if (targetPitch === undefined) {
    targetPitch = obj.data.initialViewParameters?.pitch;
  }

  var prevView = currentView;
  var targetFov = fov !== undefined ? fov : (prevView ? prevView.parameters().fov : obj.view.parameters().fov);
  var viewParams = null;
  if (targetYaw !== undefined && targetPitch !== undefined) {
    viewParams = { yaw: targetYaw, pitch: targetPitch, fov: targetFov };
  }

  var fadePct = ((typeof autoMoveActive !== 'undefined' && autoMoveActive) ||
    (typeof yellowAutoMoveEnterViaArrow !== 'undefined' && yellowAutoMoveEnterViaArrow))
    ? readAutoFadePctFromSlider()
    : null;
  var crossfadeDur = fadePct != null
    ? Math.min(2000, Math.max(0, Math.round(autoMoveInterval_ms * fadePct)))
    : 700;
  if (fromPortalHotspot) {
    crossfadeDur = Math.max(crossfadeDur, 1800);
  }

  // еҲҮжӣҝе…ҲгӮ·гғјгғігҒ® view гҒ«е…ҲгҒ«еҗ‘гҒҚгӮ’е…ҘгӮҢгҒҰгҒӢгӮү switchToпјҲ0В°гҒ«жҲ»гӮӢгҒ®гӮ’йҳІгҒҗпјү
  if (viewParams) {
    applyViewParamsToScene(obj, viewParams, 'дәӢеүҚ');
  }

  currentSceneObj = obj;
  currentScene = obj.scene;
  currentView = obj.view;
  if (guideDeviceIsIosSafari()) rebindGuideIosViewListener();

  if (sceneHasVideoHotspots(sceneId, obj.data)) {
    if (embedPlacerMode || embedShadowMode) {
      scheduleAttachVideoHotspots(sceneId, obj.data, 0);
    } else {
      attachVideoHotspots(sceneId, obj.data);
    }
  }

  currentScene.switchTo({ transitionDuration: crossfadeDur });

  if (viewParams && !embedPlacerMode) {
    function reapply(tag) {
      if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
      applyViewParamsToScene(currentSceneObj, viewParams, tag);
    }
    reapply('зӣҙеҫҢ');
    requestAnimationFrame(function() { reapply('rAF'); });
    setTimeout(function() { reapply('50ms'); }, 50);
    setTimeout(function() { reapply('fadeеҫҢ'); }, Math.max(80, crossfadeDur + 80));
    setTimeout(function() { reapply('еҶҚзўәиӘҚ'); }, crossfadeDur + 280);
  }

  if (oldVideoHandles.length) {
    setTimeout(function() {
      destroySceneVideoHotspots(oldVideoHandles);
    }, Math.max(400, crossfadeDur + 400));
  }
  
  // ===== infoHotspot гғҶгӮӯгӮ№гғҲиЎЁзӨәпјҲ1гӮ·гғјгғі1еӣһйҷҗгӮҠгғ»7з§’еҫҢгғ•гӮ§гғјгғүгӮўгӮҰгғҲпјү =====
  var textEl = document.getElementById('sceneText');
  // гҖҗиЁәж–ӯгғӯгӮ°гҖ‘data.jsгҒ®infoHotspotsгӮ’жҜҺеӣһзўәиӘҚ
  var _ihs = obj.data.infoHotspots;
  console.log('рҹ“қ [infoHotspotиЁәж–ӯ] sceneId=' + sceneId
    + ' | д»¶ж•°=' + (_ihs ? _ihs.length : 0)
    + ' | text=' + (_ihs && _ihs[0] ? (_ihs[0].text || _ihs[0].title) : 'гҒӘгҒ—'));
  if (obj.data.infoHotspots && obj.data.infoHotspots.length > 0 && (obj.data.infoHotspots[0].text || obj.data.infoHotspots[0].title)) {
    var hs = obj.data.infoHotspots[0];
    var hsStyle = hs.style || {};
    textEl.textContent = normalizeInfoHotspotText(hs.text || hs.title);
    textEl.style.fontSize = scaledSceneTextFontSize(hsStyle.fontSize || '20px');
    textEl.style.fontFamily = hsStyle.fontFamily || 'sans-serif';
    textEl.style.color = hsStyle.color || '#ffffff';
    // pitch вҶ’ з”»йқўгҒ®зёҰдҪҚзҪ®пјҲbottom %пјү
    var hsPitch = typeof hs.pitch === 'number' ? hs.pitch : 0.9;
    var bottomPct = Math.round(((1.5 - hsPitch) / 3.0) * 100);
    bottomPct = Math.max(2, Math.min(92, bottomPct));
    textEl.style.bottom = bottomPct + '%';
    // yaw вҶ’ з”»йқўгҒ®жЁӘдҪҚзҪ®пјҲleft %пјү
    var hsYaw = typeof hs.yaw === 'number' ? hs.yaw : 0;
    var leftPct = Math.round(((hsYaw + Math.PI) / (2 * Math.PI)) * 100);
    leftPct = Math.max(10, Math.min(90, leftPct));
    textEl.style.left = leftPct + '%';
    textEl.style.transition = 'none';
    textEl.style.opacity = '0';
    textEl.style.display = 'block';
    textEl.getBoundingClientRect(); // еј·еҲ¶гғӘгғ•гғӯгғјпјҡopacity:0 гӮ’зўәе®ҡгҒ•гҒӣгӮӢ
    textEl.style.transition = 'opacity 1s ease';
    textEl.style.opacity = '1';
    // ж—ўеӯҳгӮҝгӮӨгғһгғјгӮ’гғӘгӮ»гғғгғҲ
    if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
    if (window.sceneTextHideTimer) { clearTimeout(window.sceneTextHideTimer); }
    // 5з§’еҫҢгҒ«гғ•гӮ§гғјгғүгӮўгӮҰгғҲй–Ӣе§ӢпјҲд»ҘеүҚгӮҲгӮҠ2з§’зҹӯзё®пјү
    window.sceneTextTimer = setTimeout(function() {
      textEl.style.transition = 'opacity 6.75s ease';
      textEl.style.opacity = '0';
      window.sceneTextHideTimer = setTimeout(function() {
        textEl.style.display = 'none';
        window.sceneTextHideTimer = null;
      }, 6750);
      window.sceneTextTimer = null;
    }, 5000);
  } else {
    if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
    if (window.sceneTextHideTimer) { clearTimeout(window.sceneTextHideTimer); }
    textEl.style.display = 'none';
  }
  
  refreshCounterDisplay();
  console.log('рҹ”ў гӮ«гӮҰгғігӮҝгғј: ' + formatCounterLabel(obj.data) + ' (scene=' + sceneId + ')');
  // вҳ… BGMеҮҰзҗҶпјҡгӮ·гғјгғіеҲҮгӮҠжӣҝгҒҲжҷӮгҒ«еҶҚз”ҹпјҲең°еӣіON/OFFпјӢй•·жҠјгҒ—зҠ¶ж…ӢгҒ«еҫ“гҒҶпјү
  playSceneBGM(sceneId);
  
  showUI();
  
  scheduleYellowAutoMoveAfterSwitch(sceneId, crossfadeDur);
  
  // вҳ…imageHotspotsпјҲеҮәзҷәең°пјқsceneId гҒ«зҙҗгҒҘгҒҸгӮӮгҒ®гӮ’е…ЁгӮ·гғјгғігҒӢгӮүеҸҺйӣҶпјү
  var portalList = collectImageHotspotsForScene(sceneId);
  console.log('рҹ”Қ [switchScene] sceneId=' + sceneId + ' гғқгғјгӮҝгғ«д»¶ж•°=' + portalList.length);
  if (portalList.length > 0) {
    portalList.forEach(function(ih) {
      var wrapper = document.createElement('div');
      var inner = document.createElement('div');
      var img = document.createElement('img');
      var hitArea = document.createElement('div');
      var cover = null;
      var fadeMs = portalFadeMs(ih);
      var preset = portalEffectPreset(ih);
      img.src = ih.src;
      img.alt = '';
      img.style.opacity = preset.reveal ? '0' : '1';
      img.style.transition = 'opacity ' + fadeMs + 'ms ease-in-out';
      wrapper.className = 'image-hotspot portal-hotspot';
      wrapper.style.cssText = [
        'width:' + (ih.width || 400) + 'px',
        'height:' + (ih.height || 300) + 'px',
        'opacity:0',
        'transition:opacity ' + fadeMs + 'ms ease-in-out',
        'cursor:pointer',
        'pointer-events:none'
      ].join(';');
      inner.className = 'portal-inner';
      inner.appendChild(img);
      if (isRevealPortal(ih)) {
        cover = document.createElement('div');
        cover.className = 'portal-reveal-cover';
        inner.appendChild(cover);
      }
      hitArea.className = 'portal-hit-area';
      preparePortalMotion(inner, cover, ih, fadeMs);
      wrapper.appendChild(inner);
      wrapper.appendChild(hitArea);
      
      var hsRef = {
        img: wrapper,
        portalImg: img,
        inner: inner,
        cover: cover,
        hitArea: hitArea,
        ih: ih,
        sceneId: sceneId,
        flagKey: 'hotspotShown_' + sceneId + '_' + ih.targetScene,
        portalActive: false,
        videoPlaying: false,
        linkedVideo: null,
        autoFadeTimer: null
      };
      bindPortalTap(hitArea, function() { onPortalHotspotTap(hsRef); });
      
      var placeYaw = portalPlacementYawRad(ih);
      var placePitch = 0;

      // вҳ…hotspot гӮ’ VR з©әй–“гҒ«й…ҚзҪ®пјҲдёӯеҝғи§’еәҰгҒёгҖӮзҗғйқў yaw/pitch гҒ®еҖӢеҲҘиЁӯе®ҡгҒҜдҪҝгӮҸгҒӘгҒ„пјү
      currentScene.hotspotContainer().createHotspot(wrapper,
        { yaw: placeYaw, pitch: placePitch },
        { perspective: { radius: ih.radius || 800 } }
      );
      
      // вҳ…updateUI гҒ§ opacity еҲ¶еҫЎз”ЁгҒ®гӮ°гғӯгғјгғҗгғ«еҸӮз…§гӮ’дҝқжҢҒ
      if (!window.hotspotImages) window.hotspotImages = [];
      window.hotspotImages.push(hsRef);
    });
  }

  attachHiResPeekHotspot(sceneId, obj.data);

  updateCompassDisplay();
}

function hasSceneCompassData(sceneData) {
  if (!sceneData) return false;
  if (sceneData.compassHeading !== undefined && sceneData.compassHeading !== null &&
      !isNaN(Number(sceneData.compassHeading))) {
    return true;
  }
  if (sceneData.heading !== undefined && sceneData.heading !== null &&
      !isNaN(Number(sceneData.heading))) {
    return true;
  }
  return false;
}

function getSceneNorthOffset(sceneData) {
  if (!hasSceneCompassData(sceneData)) return null;
  if (sceneData.compassHeading !== undefined && sceneData.compassHeading !== null &&
      !isNaN(Number(sceneData.compassHeading))) {
    return Number(sceneData.compassHeading);
  }
  return Number(sceneData.heading);
}

function updateLocationWidgets() {
  var sceneData = currentSceneObj && currentSceneObj.data;
  var hasCompass = hasSceneCompassData(sceneData);
  var northOff = getSceneNorthOffset(sceneData);
  var yawDeg = currentView ?
    radToDeg(normalizeAngle(currentView.parameters().yaw)) : 0;
  var hasPos = sceneData && sceneData.lat != null && sceneData.lng != null &&
    !isNaN(Number(sceneData.lat)) && !isNaN(Number(sceneData.lng));

  if (miniMapWidget) {
    miniMapWidget.update({
      lat: hasPos ? Number(sceneData.lat) : null,
      lng: hasPos ? Number(sceneData.lng) : null,
      yawDeg: yawDeg,
      northOff: northOff,
      showBearing: hasCompass,
      sceneId: sceneData ? sceneData.id : ''
    });
  }
}

function updateCompassDisplay() {
  updateLocationWidgets();
}

function updateUI() {
  if (!currentView) return;
  refreshCounterDisplay();
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var pitch = radToDeg(currentView.parameters().pitch);

  var yawEl = document.getElementById('yawTxt');
  var pitchEl = document.getElementById('pitchTxt');
  if (yawEl) yawEl.textContent = String(Math.round(yawDeg));
  if (pitchEl) pitchEl.textContent = String(Math.round(pitch));

  updateCompassDisplay();

  // вҳ…гғӣгғғгғҲгӮ№гғқгғғгғҲгӮЁгғҮгӮЈгӮҝйҖЈжҗәпјҡзҸҫеңЁгҒ®еҗ‘гҒҚгӮ’localStorageгҒ«жӣёгҒҚиҫјгӮҖ
  try {
    localStorage.setItem('hs_sceneId', currentSceneObj ? currentSceneObj.data.id : '');
    localStorage.setItem('hs_yaw',   currentView.parameters().yaw);
    localStorage.setItem('hs_pitch', currentView.parameters().pitch);
  } catch(e) {}

  updateHiResPeekFrameVisibility();

  var yawAbs = Math.abs(yawDeg);
  var isVert = yawAbs <= 45 || yawAbs > 135;
  var junctionCfg = currentSceneObj ? getSideBranchSceneConfig(currentSceneObj.data.id) : null;
  var junctionVis = getJunctionYellowLayout(junctionCfg);
  var showUp = junctionVis ? junctionVis.up : isVert;
  var showDown = junctionVis ? junctionVis.down : isVert;
  var showLeft = junctionVis ? junctionVis.left : !isVert;
  var showRight = junctionVis ? junctionVis.right : !isVert;
  document.getElementById('arrowUp').style.visibility = showUp ? 'visible' : 'hidden';
  document.getElementById('arrowDown').style.visibility = showDown ? 'visible' : 'hidden';
  document.getElementById('arrowLeft').style.visibility = showLeft ? 'visible' : 'hidden';
  document.getElementById('arrowRight').style.visibility = showRight ? 'visible' : 'hidden';
  syncYellowArrowVisibility();

  if (window.hotspotImages && window.hotspotImages.length > 0) {
    window.hotspotImages.forEach(function(hs) {
      if (currentSceneObj && currentSceneObj.data.id === hs.sceneId && !window[hs.flagKey]) {
        var center = portalCenterDeg(hs.ih);
        var range = portalRangeDeg(hs.ih);
        var inRange = Math.abs(angleDiffDeg(yawDeg, center)) <= range;
        
        if (inRange) {
          var fadeMs = portalFadeMs(hs.ih);
          var dispMs = portalDispMs(hs.ih);
          var totalTime = fadeMs + dispMs;
          var preset = portalEffectPreset(hs.ih);
          var appearMs = fadeMs;
          var imageDelayMs = preset.reveal ? Math.min(120, Math.round(portalStartHoldMs(hs.ih, preset) * 0.5), Math.max(0, totalTime - appearMs)) : 0;
          window[hs.flagKey] = true;
          showPortalMotion(hs.inner, hs.cover, hs.ih, totalTime);
          hs.img.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
          hs.img.style.opacity = '1';
          setPortalTappable(hs, true);
          if (hs.portalImg) {
            hs.portalImg.style.opacity = preset.reveal ? '0' : '1';
            hs.portalImg.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
            setTimeout(function() {
              if (hs.portalImg) hs.portalImg.style.opacity = '1';
            }, imageDelayMs);
          }
          console.log('рҹҺҺ hotspot гғ•гӮ§гғјгғүгӮӨгғій–Ӣе§Ӣ: ' + hs.ih.src + ' (fadeTime=' + hs.ih.fadeTime + 's, dispTime=' + dispMs + 'ms вҶ’ totalTime=' + totalTime + 'ms вүҲ ' + (totalTime/1000).toFixed(1) + 'з§’)');
          
          if (hs.ih.videoSrc && hs.ih.playVideoOnTap !== false) {
            console.log('рҹҺ¬ еӢ•з”»гғқгғјгӮҝгғ«: гӮҝгғғгғ—гҒ§ ' + hs.ih.videoSrc + ' гӮ’еҶҚз”ҹ');
          }
          // дёҖе®ҡжҷӮй–“еҫҢгҒҜгғқгғјгӮҝгғ«з”»еғҸгӮ’ж¶ҲгҒ—гҖҒжҷҜиүІгӮ’йҡ гҒ—з¶ҡгҒ‘гҒӘгҒ„гӮҲгҒҶгҒ«гҒҷгӮӢ
          hs.autoFadeTimer = setTimeout(function() {
            if (hs.videoPlaying) return;
            hidePortalMotion(hs.inner, hs.cover, hs.ih);
            if (hs.portalImg) hs.portalImg.style.opacity = preset.reveal ? '0' : '1';
            hs.img.style.opacity = '0';
            setPortalTappable(hs, false);
            console.log('рҹҺҺ hotspot гғ•гӮ§гғјгғүгӮўгӮҰгғҲй–Ӣе§Ӣ: ' + hs.ih.src);
            if (hs.ih.resetDisplay) {
              window[hs.flagKey] = false;
              console.log('рҹ”„ hotspot гғӘгӮ»гғғгғҲиЎЁзӨәжңүеҠ№: ж¬ЎгҒ«иЎЁзӨәзҜ„еӣІгҒ«е…ҘгҒЈгҒҹгӮүеҶҚиЎЁзӨәгҒ—гҒҫгҒҷ');
            }
          }, totalTime);
        }
      }
    });
  }

  updateSideBranchBlink();
}

document.getElementById('speedSlider').addEventListener('input',function(e){
  var v=parseInt(e.target.value);autoMoveInterval_ms=speedToMs(v);
  document.getElementById('speedVal').textContent=speedLabels[v]||v;_save('speed',v);if(autoMoveActive)startContinuousZoom();
});
var zoomLabels=['','гӮјгғӯ','0.1В°','0.2В°','0.3В°','0.4В°','0.5В°','0.6В°','0.7В°','0.8В°'];
function zoomRangeDeg(v){return v<=1?0:+(((v-1)*0.1).toFixed(1));}
function zoomToMin(v){return v<=1?breathMax:+(breathMax-zoomRangeDeg(v)).toFixed(2);}
function migrateZoomSliderValue(v){
  v=parseInt(v,10);
  if(isNaN(v)||v<1)return 2;
  if(v===1)return 1;
  if(v<=4)return Math.min(9,v+1);
  return 5;
}

  document.getElementById('zoomVal').textContent=zoomLabels[v]||(zoomRangeDeg(v)+'В°');_save('zoom',v);if(autoMoveActive)startContinuousZoom();
});
var fadeLabels=['','гҒӘгҒ—','жҘөе°Ҹ','е°Ҹ','гӮ„гӮ„е°Ҹ','дёӯ','гӮ„гӮ„еӨ§','еӨ§','жҘөеӨ§','жңҖеӨ§'];

/* ========================================
   вҳ…зөұеҗҲзүҲпјҡй»„иүІзҹўеҚ°еҮҰзҗҶ
   2жңҲзүҲгҒ®гӮ·гғігғ—гғ«гғӯгӮёгғғгӮҜ + зҸҫеңЁзүҲгҒ®и„ҮйҒ“еҮҰзҗҶ
======================================== */

function getPreservedViewParams() {
  if (!currentView) return { yaw: 0, pitch: 0, fov: 1.15 };
  var p = currentView.parameters();
  return { yaw: p.yaw, pitch: p.pitch, fov: p.fov };
}

/** cc гҒ® C1вҶ”C2вҶ”C3пјҡе·ҰеҸіз§»еӢ•жҷӮгҒҜиҰӢгҒҰгҒ„гӮӢеҗ‘гҒҚгӮ’гҒқгҒ®гҒҫгҒҫз¶ӯжҢҒпјҲзӣёеҜҫyawгҒ гҒЁ180В°еҸҚи»ўгҒҷгӮӢгҒ“гҒЁгҒҢгҒӮгӮӢпјү */
function switchCcChainScene(targetSceneId) {
  var v = getPreservedViewParams();
  console.log(
    'рҹ”— ccз§»еӢ•: ' + currentSceneObj.data.id + ' вҶ’ ' + targetSceneId +
    ' (еҗ‘гҒҚз¶ӯжҢҒ yaw=' + radToDeg(v.yaw).toFixed(1) + 'В° pitch=' + radToDeg(v.pitch).toFixed(1) + 'В°)'
  );
  switchScene(targetSceneId, v.yaw, v.pitch, v.fov);
}

function findSceneIdByDelta(delta) {
  if (!delta || !currentSceneObj) return null;
  var currentPos = Number(inferScenePosition(currentSceneObj.data));
  var nextPos = currentPos + delta;
  var currentCourse = sceneCourseKey(currentSceneObj.data);

  if (currentCourse === 'cc' && CC_CHAIN_SCENE_IDS[nextPos]) {
    return CC_CHAIN_SCENE_IDS[nextPos];
  }

  for (var id in scenesData) {
    var sd = scenesData[id].data;
    if (Number(sd.position) === nextPos &&
        sceneCourseKey(sd) === currentCourse) {
      return id;
    }
  }

  for (var fallbackId in scenesData) {
    var fallbackSd = scenesData[fallbackId].data;
    if (Number(fallbackSd.position) === nextPos &&
        fallbackSd.direction === currentSceneObj.data.direction) {
      return fallbackId;
    }
  }
  return null;
}

function executeMoveByDelta(delta) {
  if (!currentView || !currentSceneObj) return;
  var targetId = findSceneIdByDelta(delta);
  if (!targetId) {
    console.warn('вҡ пёҸ ж¬ЎгҒ®гӮ·гғјгғігҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“: course=' + sceneCourseKey(currentSceneObj.data) + ', delta=' + delta);
    return;
  }
  if (sceneCourseKey(currentSceneObj.data) === 'cc') {
    switchCcChainScene(targetId);
    return;
  }
  switchScene(targetId, getRelativeSceneYaw(targetId), getRelativeScenePitch(targetId), currentView.parameters().fov);
}

function computeMoveDelta(isUp) {
  if (!currentSceneObj || !currentView) return 0;
  if (currentSceneObj.data.direction === 'portal') return 0;
  var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
  if (isSideRoute(currentSceneObj.data.id)) {
    return isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  }
  var delta;
  if (currentSceneObj.data.direction === 'iki') {
    delta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  } else {
    delta = isUp ? (isLookingFront ? -1 : 1) : (isLookingFront ? 1 : -1);
  }
  if (flipDir) delta = -delta;
  return delta;
}

function computeAutoMoveIsUpForDelta(wantDelta) {
  if (!currentSceneObj || !currentView) return true;
  var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
  var want = wantDelta;
  if (flipDir) want = -want;
  var dir = currentSceneObj.data.direction;
  if (dir === 'iki') {
    if (want === 1) return isLookingFront;
    if (want === -1) return !isLookingFront;
  } else if (dir === 'kaeri') {
    if (want === 1) return !isLookingFront;
    if (want === -1) return isLookingFront;
  }
  return true;
}

function peekNextSceneIdForMove(isUp) {
  if (!currentSceneObj) return null;
  if (isSideRoute(currentSceneObj.data.id)) {
    var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
    var chainDelta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
    return findSideRouteChainSceneId(chainDelta);
  }
  return findSceneIdByDelta(computeMoveDelta(isUp));
}

function sceneYellowAutoMoveEnabled(sceneData) {
  return !!(sceneData && sceneData.yellowAutoMove === true);
}

/** й»„зҹўеҚ°гҒ®гҖҢжӯЈйқўгҖҚпјқе·ҰеҸі90В°д»ҘеҶ…пјҲжҢҜгӮҠеҗ‘гҒҚгҒҜиғҢйқўжүұгҒ„пјү */
function isYellowLookingForward() {
  return Math.abs(getGreenArrowViewYawDeg()) <= 90;
}

function getSceneInitialYaw(sceneId, fallbackYaw) {
  var obj = scenesData[sceneId];
  var yaw = obj && obj.data && obj.data.initialViewParameters ? obj.data.initialViewParameters.yaw : undefined;
  return yaw !== undefined && yaw !== null ? yaw : fallbackYaw;
}

function getSceneInitialPitch(sceneId, fallbackPitch) {
  var obj = scenesData[sceneId];
  var pitch = obj && obj.data && obj.data.initialViewParameters ? obj.data.initialViewParameters.pitch : undefined;
  return pitch !== undefined && pitch !== null ? pitch : fallbackPitch;
}

function getRelativeSceneYaw(targetSceneId) {
  var currentYaw = currentView.parameters().yaw;
  var currentInitialYaw = currentSceneObj && currentSceneObj.data && currentSceneObj.data.initialViewParameters
    ? currentSceneObj.data.initialViewParameters.yaw
    : 0;
  var targetInitialYaw = getSceneInitialYaw(targetSceneId, currentInitialYaw);
  return normalizeAngle(targetInitialYaw + normalizeAngle(currentYaw - currentInitialYaw));
}

function getRelativeScenePitch(targetSceneId) {
  var currentPitch = currentView.parameters().pitch;
  var currentInitialPitch = currentSceneObj && currentSceneObj.data && currentSceneObj.data.initialViewParameters
    ? currentSceneObj.data.initialViewParameters.pitch
    : 0;
  var targetInitialPitch = getSceneInitialPitch(targetSceneId, currentInitialPitch);
  return targetInitialPitch + (currentPitch - currentInitialPitch);
}

/** жҲ»гӮҠ(target) гҒ®еҲ°зқҖгғЁгғјгҖӮж•°еҖӨгҒҫгҒҹгҒҜ { left:0, down:90, ... } гӮ’и§ЈйҮҲ */
function resolveReturnToTargetYawDeg(cfg, direction) {
  if (!cfg || cfg.returnToTargetYawDeg === undefined || cfg.returnToTargetYawDeg === null || cfg.returnToTargetYawDeg === '') {
    return null;
  }
  var val = cfg.returnToTargetYawDeg;
  if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
    if (direction && val[direction] !== undefined && val[direction] !== null && val[direction] !== '') {
      return degToRad(parseFloat(val[direction]));
    }
    return null;
  }
  return degToRad(parseFloat(val));
}

function getGreenArrowViewYawDeg() {
  if (!currentView || !currentSceneObj) return 0;
  var yaw = currentView.parameters().yaw;
  var initYaw = currentSceneObj.data && currentSceneObj.data.initialViewParameters
    ? currentSceneObj.data.initialViewParameters.yaw
    : 0;
  return radToDeg(normalizeAngle(yaw - initYaw));
}

/** й»„гҒ®е·ҰеҸігҒҢеҮәгӮӢеҗ‘гҒҚпјқжЁӘеҗ‘гҒҚгҖӮз·‘дёҠдёӢгҒҜгҒ“гҒ®гҒЁгҒҚгҒ гҒ‘ */
function isViewHorizontalForCrossCourse() {
  if (!currentView) return false;
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var yawAbs = Math.abs(yawDeg);
  return !(yawAbs <= 45 || yawAbs > 135);
}

/** й»„гҒ®дёҠдёӢгҒҢеҮәгӮӢеҗ‘гҒҚпјқжӯЈйқўгҖӮйқ’е·ҰеҸігҒҜгҒ“гҒ®гҒЁгҒҚ */
function isViewForwardForCrossCourse() {
  return !isViewHorizontalForCrossCourse();
}

function isAngleInRangeDeg(angle, start, end) {
  if (start <= end) return angle >= start && angle <= end;
  return angle >= end && angle <= start;
}

function getSideBranchSceneConfig(sceneId) {
  if (!sceneId || !window.sideBranchConfig || !window.sideBranchConfig.branches) return null;
  for (var i = 0; i < window.sideBranchConfig.branches.length; i++) {
    if (window.sideBranchConfig.branches[i].sceneId === sceneId) {
      return window.sideBranchConfig.branches[i];
    }
  }
  return null;
}

/** еҲҶеІҗгғ»жҲ»гӮҠгҒ®зӮ№ж»…гҒҜгӮ·гғјгғіжӯЈйқўгҒӢгӮүгҒ®зӣёеҜҫгғЁгғјпјҲз·‘зҹўеҚ°гҒЁеҗҢгҒҳпјүВұгҒ“гҒ®и§’еәҰгҒ гҒ‘ */
var JUNCTION_BLINK_HALF_DEG = 20;

function isRelYawInBlinkSector(relYawDeg, centerDeg) {
  return Math.abs(angleDiffDeg(relYawDeg, centerDeg)) <= JUNCTION_BLINK_HALF_DEG;
}

function getBranchBlinkSectors(cfg) {
  var forwardDir = (cfg && cfg.forwardDir) ? String(cfg.forwardDir).toLowerCase() : 'right';
  var rightDir = (cfg && cfg.rightDir) ? String(cfg.rightDir).toLowerCase() : 'up';
  var leftDir = (cfg && cfg.leftDir) ? String(cfg.leftDir).toLowerCase() : 'right';
  var backDir = (cfg && cfg.backDir) ? String(cfg.backDir).toLowerCase() : 'left';

  var forwardDirs = [forwardDir];
  if (cfg && cfg.crossroads && cfg.targetAlt) {
    // еҚҒеӯ—и·ҜпјҡжӯЈйқўгҒ§е·ҰеҸізӮ№ж»…пјҲforwardDir гҒҢеҸі/е·ҰгҒ§гҒӘгҒҸгҒҰгӮӮгҖҒе·ҰеҸігҒ гҒ‘иҝҪеҠ пјү
    if (forwardDirs.indexOf('right') < 0) forwardDirs.push('right');
    if (forwardDirs.indexOf('left') < 0) forwardDirs.push('left');
  }

  // еҲҶеІҗзӮ№гҒ®зӮ№ж»…гҒҜ 0В°/Вұ90В°/180В° гҒ®4ж–№еҗ‘пјҲВұ20В°пјү
  return [
    { center: 0, dirs: forwardDirs },
    { center: 90, dirs: [rightDir] },
    { center: -90, dirs: [leftDir] },
    { center: 180, dirs: [backDir] }
  ];
}

function getReturnBlinkSectors() {
  // жҲ»гӮҠзӮ№пјҡж—ўе®ҡгҒҜгҖҢжӯЈйқўВұ20В°гҒ§дёӢгҖҚгҖӮ
  // cfg.returnCenterDeg гҒҢгҒӮгӮҢгҒ°гҖҒгҒқгҒ®и§’еәҰгҒ§дёӢгӮ’зӮ№ж»…гҒҷгӮӢпјҲдҫӢ: -90пјүгҖӮ
  return [{ center: 0, dirs: ['down'] }];
}

function collectJunctionBlinksFromSectors(relYawDeg, sectors) {
  var blinks = [];
  var forceShow = { up: false, down: false, left: false, right: false };
  sectors.forEach(function(sec) {
    if (!isRelYawInBlinkSector(relYawDeg, sec.center)) return;
    sec.dirs.forEach(function(d) {
      if (blinks.indexOf(d) < 0) blinks.push(d);
      forceShow[d] = true;
    });
  });
  return { blinks: blinks, forceShow: forceShow };
}

/**
 * йҖҡеёёгҒ®й»„зҹўеҚ°пјҲзө¶еҜҫгғЁгғјгҒ§дёҠдёӢ or е·ҰеҸіпјүпјӢеҲҶеІҗжҷӮгҒ гҒ‘гҖҒ
 * зӣёеҜҫгғЁгғјгҒ®зӢӯгҒ„жүҮеҪўеҶ…гҒ§и„ҮйҒ“з”ЁгҒ®зҹўеҚ°гӮ’иҝҪеҠ иЎЁзӨәгғ»зӮ№ж»…гҖӮ
 */
function getJunctionYellowLayout(cfg) {
  if (!cfg) return null;
  // жҲ»гӮҠең°зӮ№гҒҜгҖҢеұҘжӯҙгҒӮгӮҠгҖҚгҒҫгҒҹгҒҜгҖҢtargetжҢҮе®ҡгҒӮгӮҠгҖҚгҒ®гҒ©гҒЎгӮүгҒӢгҒ§жңүеҠ№
  if (cfg.type === 'return' && !hasActiveSideReturn() && !cfg.target) return null;
  if (cfg.type !== 'branch' && cfg.type !== 'return') return null;

  var relYaw = getGreenArrowViewYawDeg();
  var sectors;
  if (cfg.type === 'return') {
    // жҲ»гӮҠең°зӮ№гҒҜгҖҢгҒ©гҒ®зҹўеҚ°гҒ§жҲ»гӮӢгҒӢгҖҚгӮ’иЁӯе®ҡгҒ§жҢҒгҒҰгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢ
    // - cfg.returnSectors: [{center:-90, dirs:['left']}, ...]
    // - з„ЎгҒ‘гӮҢгҒ° cfg.returnCenterDeg гҒ®и§’еәҰгҒ§ down
    if (Array.isArray(cfg.returnSectors) && cfg.returnSectors.length > 0) {
      sectors = cfg.returnSectors
        .map(function(s) {
          if (!s) return null;
          var center = (s.center !== undefined && s.center !== null && s.center !== '') ? parseFloat(s.center) : null;
          var dirs = Array.isArray(s.dirs) ? s.dirs.map(function(d){return String(d).toLowerCase();}) : [];
          if (center === null || !dirs.length) return null;
          return { center: center, dirs: dirs };
        })
        .filter(Boolean);
      if (!sectors.length) sectors = [{ center: 0, dirs: ['down'] }];
    } else {
      var c = (cfg.returnCenterDeg !== undefined && cfg.returnCenterDeg !== null && cfg.returnCenterDeg !== '')
        ? parseFloat(cfg.returnCenterDeg)
        : 0;
      sectors = [{ center: c, dirs: ['down'] }];
    }
  } else {
    sectors = getBranchBlinkSectors(cfg);
  }
  var collected = collectJunctionBlinksFromSectors(relYaw, sectors);
  var isVert = getCurrentViewIsVert();
  var fs = collected.forceShow;
  return {
    up: isVert || fs.up,
    down: isVert || fs.down,
    left: !isVert || fs.left,
    right: !isVert || fs.right,
    blinks: collected.blinks
  };
}

function getCurrentViewIsVert() {
  if (!currentView) return true;
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var yawAbs = Math.abs(yawDeg);
  return yawAbs <= 45 || yawAbs > 135;
}

function getAutoBlinkDirections(cfg) {
  if (!cfg) return [];
  var layout = getJunctionYellowLayout(cfg);
  return layout ? layout.blinks.slice() : [];
}

/**
 * жҠјгҒ—гҒҹй»„зҹўеҚ°гҒ®еҗ‘гҒҚ вҶ’ з§»еӢ•е…ҲгӮ·гғјгғігҒ§гҒ®гғЁгғјиЈңжӯЈпјҲеәҰпјүгҖӮ
 * жң¬з·ҡ(aa)вҶ’и„ҮйҒ“(bb/cc)гҒ®зӣҙи§’е…ҘгӮҠеҸЈз”ЁгҖӮmap гҒ® yawOffset жңӘжҢҮе®ҡжҷӮгҒ®иҮӘеӢ•еҖӨгҖӮ
 */
function inferSideBranchYawOffsetDeg(exitDirection, fromSceneId, targetId) {
  var fromObj = scenesData[fromSceneId];
  var targetObj = scenesData[targetId];
  if (!fromObj || !targetObj) return 0;
  var fromCourse = sceneCourseKey(fromObj.data);
  var targetCourse = sceneCourseKey(targetObj.data);
  var mainToSide = fromCourse === 'aa' && (targetCourse === 'bb' || targetCourse === 'cc');
  var sideToSide = (fromCourse === 'bb' || fromCourse === 'cc') && (targetCourse === 'bb' || targetCourse === 'cc') && fromCourse !== targetCourse;
  if (!mainToSide && !sideToSide) return 0;

  if (targetCourse === 'bb') {
    // aaвҶ’bbпјҡе…ҘеҸЈгҒҜгҖҢзӣҙи§’гҒ«жӣІгҒҢгӮӢгҖҚеүҚжҸҗ
    // - жӯЈйқўгҒ§гҖҢеҸігҖҚгӮ’жҠјгҒҷ вҶ’ bbеҒҙгҒҜ -90В°
    // - еҸігӮ’еҗ‘гҒ„гҒҰгҖҢдёҠгҖҚгӮ’жҠјгҒҷ вҶ’ bbеҒҙгҒҜ 0В°пјҲbbгҒ§еүҚеҗ‘гҒҚеүҚйҖІгҒ§гҒҚгӮӢгӮҲгҒҶгҒ«пјү
    if (exitDirection === 'right') return -90;
    if (exitDirection === 'up') return 0;
    if (exitDirection === 'left') return 90;
    if (exitDirection === 'down') return 180;
  }
  if (targetCourse === 'cc') {
    // bbвҶ’ccпјҲеҲҶеІҗпјүпјҡbb3 гҒ®гҖҢдёҠгҖҚгӮ„гҖҢеҸігҖҚгҒ§ cc2 гҒ«е…ҘгӮӢжҷӮгҒҜ -90В° гӮ’еҹәжә–гҒ«гҒ—гҒҹгҒ„
    if (fromCourse === 'bb' && targetCourse === 'cc') {
      if (exitDirection === 'up' || exitDirection === 'right') return -90;
      if (exitDirection === 'left') return 90;
      if (exitDirection === 'down') return 180;
    }
    if (exitDirection === 'right') return 90;
    if (exitDirection === 'left') return -90;
    if (exitDirection === 'up') return 0;
    if (exitDirection === 'down') return 180;
  }
  return 0;
}

/** и„ҮйҒ“йҒ·з§»гҒ®еҲ°зқҖгғЁгғјпјҲз·‘зҹўеҚ° computeGreenArrowTargetYaw гҒЁеҗҢгҒҳејҸпјү */
function computeSideBranchTargetYaw(exit, fromSceneId, targetId) {
  var targetObj = scenesData[targetId];
  if (!targetObj || !currentView) return getRelativeSceneYaw(targetId);
  var targetInitialYaw = targetObj.data.initialViewParameters
    ? targetObj.data.initialViewParameters.yaw
    : 0;
  var departureYaw = currentView.parameters().yaw;
  var cfg = getSideBranchSceneConfig(fromSceneId);
  var yawOffsetDeg = inferSideBranchYawOffsetDeg(exit.direction, fromSceneId, targetId);
  var yawSource = 'infer';
  var yawExplicit = false;

  if (cfg) {
    if (cfg.entryYaw && cfg.entryYaw[exit.direction] != null && cfg.entryYaw[exit.direction] !== '') {
      yawOffsetDeg = parseFloat(cfg.entryYaw[exit.direction]);
      yawSource = 'cfg.entryYaw[' + exit.direction + ']';
      yawExplicit = true;
    } else if (cfg.yawOffset != null && cfg.yawOffset !== '' && exit.direction === 'right') {
      yawOffsetDeg = parseFloat(cfg.yawOffset);
      yawSource = 'cfg.yawOffset';
      yawExplicit = true;
    }
  }

  // NOTE: sideBranches гҒҜгҖҢеҲҶеІҗгҒЁгҒ—гҒҰжӣІгҒҢгҒЈгҒҰе…ҘгӮӢгҖҚз”ЁйҖ”гҒҢгҒӮгӮӢгҒҹгӮҒгҖҒ
  // bbвҶ”cc гҒ®гӮҲгҒҶгҒӘгӮігғјгӮ№й–“гҒ§гӮӮ yawOffset гҒҢгҒӮгӮӢе ҙеҗҲгҒҜжЁӘз§»еӢ•жүұгҒ„гҒ§жҪ°гҒ•гҒӘгҒ„гҖӮ
  // yawOffset гҒҢ0гҒ§гҖҒгҒӢгҒӨ lateral гҒ®жҷӮгҒ гҒ‘гҖҢиҰӢгҒҰгҒ„гӮӢеҗ‘гҒҚз¶ӯжҢҒгҖҚгӮ’дҪҝгҒҶгҖӮ
  var lateral = isLateralViewpointMove(fromSceneId, targetId);
  console.log(
    'рҹ§ӯ [sideYaw] from=' + fromSceneId + ' to=' + targetId +
    ' dir=' + exit.direction +
    ' lateral=' + lateral +
    ' yawOffsetDeg=' + yawOffsetDeg +
    ' source=' + yawSource
  );
  if (lateral) {
    // жЁӘз§»еӢ•гҒ§гӮӮгҖҢеҲҶеІҗгҒЁгҒ—гҒҰжӣІгҒҢгҒЈгҒҰе…ҘгӮӢгҖҚжҢҮе®ҡгҒҢгҒӮгӮӢжҷӮгҒҜгҖҒгҒқгҒ®и§’еәҰгӮ’е„Әе…ҲгҒҷгӮӢ
    if (yawExplicit || (yawOffsetDeg !== undefined && yawOffsetDeg !== null && yawOffsetDeg !== '' && parseFloat(yawOffsetDeg) !== 0)) {
      var y = normalizeAngle(targetInitialYaw + degToRad(parseFloat(yawOffsetDeg)));
      console.log('рҹ§ӯ [sideYaw] lateral: use yawOffset вҶ’ yaw=' + radToDeg(normalizeAngle(y)).toFixed(1) + 'В°');
      return y;
    }
    console.log('рҹ§ӯ [sideYaw] lateral: keep relative yaw');
    return getRelativeSceneYaw(targetId);
  }

  return computeGreenArrowTargetYaw(
    { targetSceneId: targetId, yawOffset: yawOffsetDeg },
    departureYaw,
    targetInitialYaw,
    fromSceneId
  );
}

function getSideBranchExitForDirection(direction) {
  if (!currentSceneObj) return null;
  var cfg = getSideBranchSceneConfig(currentSceneObj.data.id);
  if (!cfg) return null;
  var blinks = getAutoBlinkDirections(cfg);
  if (blinks.indexOf(direction) < 0) return null;

  if (cfg.type === 'return') {
    // йҖҡеёёгҒҜгҖҢе…ҘгҒЈгҒҰгҒҚгҒҹеұҘжӯҙпјҲreturnSceneпјүгҖҚгҒёжҲ»гӮӢпјқи§’еәҰгӮӮиҝҪеҫ“гҒ§гҒҚгӮӢ
    if (hasActiveSideReturn()) return { direction: direction, action: 'return' };
    // гғ”гғігҒӢгӮүзӣҙжҺҘе…ҘгҒЈгҒҹе ҙеҗҲгҒ гҒ‘гҖҒtarget гҒҢгҒӮгӮҢгҒ°гҒқгҒ“гҒёжҲ»гҒҷпјҲгғ•гӮ©гғјгғ«гғҗгғғгӮҜпјү
    if (cfg.target) return { direction: direction, action: 'return_to_target', targetSceneId: cfg.target };
    return { direction: direction, action: 'return' };
  }

  var targetId = cfg.target;
  if (direction === 'left' && cfg.targetAlt) targetId = cfg.targetAlt;
  if (!targetId) return null;
  return { direction: direction, targetSceneId: targetId };
}

function isSideBranchDirectionBlinking(direction) {
  if (!currentSceneObj) return false;
  var cfg = getSideBranchSceneConfig(currentSceneObj.data.id);
  if (!cfg) return false;
  return getAutoBlinkDirections(cfg).indexOf(direction) >= 0;
}

function trySideBranchMove(direction) {
  if (currentSceneObj && sceneCourseKey(currentSceneObj.data) === 'cc' &&
      (direction === 'up' || direction === 'down')) {
    var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
    var chainDelta = direction === 'up'
      ? (isLookingFront ? 1 : -1)
      : (isLookingFront ? -1 : 1);
    if (findSideRouteChainSceneId(chainDelta)) {
      return false;
    }
  }
  var exit = getSideBranchExitForDirection(direction);
  if (exit) {
    console.log('рҹҹЁ [sideBranch] trigger: scene=' + (currentSceneObj ? currentSceneObj.data.id : '?') + ' dir=' + direction + ' action=' + (exit.action || 'move') + ' target=' + (exit.targetSceneId || ''));
    executeSideBranch(exit);
    return true;
  }
  if (isSideBranchDirectionBlinking(direction)) return true;
  return false;
}

function executeSideBranch(exit) {
  if (!currentSceneObj || !exit) return;
  if (exit.action === 'return') {
    returnToSideRouteOrigin();
    return;
  }
  if (exit.action === 'return_to_target') {
    var retId = resolveSceneId(exit.targetSceneId) || exit.targetSceneId;
    if (!scenesData[retId]) {
      console.warn('вҡ пёҸ жҲ»гӮҠ(target): йҒ·з§»е…ҲгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“:', exit.targetSceneId);
      return;
    }
    // зӣҙжҺҘгғ”гғігҒ§е…ҘгҒЈгҒҹгӮұгғјгӮ№пјҡж—ўе®ҡгҒҜиҰӢгҒҲж–№з¶ӯжҢҒгҒ гҒҢгҖҒиЁӯе®ҡгҒҢгҒӮгӮҢгҒ°еҲ°зқҖyawгӮ’еӣәе®ҡгҒ§гҒҚгӮӢ
    var cfg = getSideBranchSceneConfig(currentSceneObj.data.id);
    var ty;
    var tyResolved = resolveReturnToTargetYawDeg(cfg, exit.direction);
    if (tyResolved !== null) {
      ty = tyResolved;
    } else {
      ty = getRelativeSceneYaw(retId);
    }
    var tp = getRelativeScenePitch(retId);
    console.log(
      'рҹҹЎ жҲ»гӮҠ(target): ' + currentSceneObj.data.id + ' вҶ’ ' + retId +
      ' dir=' + (exit.direction || '?') +
      ' yaw=' + radToDeg(normalizeAngle(ty)).toFixed(1) + 'В°'
    );
    switchScene(retId, ty, tp, currentView.parameters().fov, true);
    return;
  }
  var targetId = resolveSceneId(exit.targetSceneId) || exit.targetSceneId;
  var targetObj = scenesData[targetId];
  if (!targetObj) {
    console.warn('вҡ пёҸ и„ҮйҒ“: йҒ·з§»е…ҲгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“:', exit.targetSceneId);
    return;
  }
  var fromSceneId = currentSceneObj.data.id;
  var departureYaw = currentView.parameters().yaw;
  var departurePitch = currentView.parameters().pitch;
  var initYaw = targetObj.data.initialViewParameters
    ? targetObj.data.initialViewParameters.yaw
    : 0;
  var targetYaw = computeSideBranchTargetYaw(exit, fromSceneId, targetId);
  var targetPitch = isLateralViewpointMove(fromSceneId, targetId)
    ? departurePitch
    : getRelativeScenePitch(targetId);
  var appliedOffsetDeg = radToDeg(normalizeAngle(targetYaw - initYaw));

  window.returnScene = fromSceneId;
  window.returnEntryScene = targetId;
  window.departureYaw = departureYaw;
  window.departurePitch = departurePitch;
  window.targetSceneId = targetId;
  window.entryInitialYaw = initYaw;
  window.entryYawOffset = normalizeAngle(targetYaw - initYaw);
  window.entryPitch = targetPitch;
  window.allowYellowSideReturn = !isLateralViewpointMove(fromSceneId, targetId);

  console.log(
    'рҹҹЎ и„ҮйҒ“: ' + fromSceneId + ' вҶ’ ' + targetId + ' (' + exit.direction + ')' +
    ' | relYaw=' + getGreenArrowViewYawDeg().toFixed(1) + 'В°' +
    ' вҶ’ yaw=' + radToDeg(normalizeAngle(targetYaw)).toFixed(1) + 'В° (offset=' + appliedOffsetDeg.toFixed(1) + 'В°)' +
    ' pitch=' + radToDeg(targetPitch).toFixed(1) + 'В°'
  );
  switchScene(targetId, targetYaw, targetPitch, currentView.parameters().fov, true);
}

var ARROW_DIR_TO_ID = { up: 'arrowUp', down: 'arrowDown', left: 'arrowLeft', right: 'arrowRight' };

function updateSideBranchBlink() {
  ['up', 'down', 'left', 'right'].forEach(function(dir) {
    var el = document.getElementById(ARROW_DIR_TO_ID[dir]);
    if (!el) return;
    if (isSideBranchDirectionBlinking(dir)) el.classList.add('arrow-blink');
    else el.classList.remove('arrow-blink');
  });
}

function sceneHasGreenArrowConfig(sceneId) {
  if (!sceneId || !window.greenArrowConfig || !window.greenArrowConfig.arrows.length) return false;
  for (var i = 0; i < window.greenArrowConfig.arrows.length; i++) {
    if (window.greenArrowConfig.arrows[i].sceneId === sceneId) return true;
  }
  return false;
}

/** гӮігғјгӮ№й–“гғҸгғ–пјқйқ’гҒҢе·ҰеҸідёЎж–№гҒӮгӮӢгӮ·гғјгғіпјҲ23-bb004 гҒ®гҒҝжғіе®ҡпјүгҖӮC1/D1 гҒҜгғҸгғ–гҒ§гҒҜгҒӘгҒ„ */
function isCrossCourseHub(sceneId) {
  if (!sceneId || !window.blueArrowConfig || !window.blueArrowConfig.arrows.length) return false;
  var hasLeft = false;
  var hasRight = false;
  for (var i = 0; i < window.blueArrowConfig.arrows.length; i++) {
    var a = window.blueArrowConfig.arrows[i];
    if (a.sceneId !== sceneId) continue;
    if (a.side === 'left') hasLeft = true;
    if (a.side === 'right') hasRight = true;
  }
  return hasLeft && hasRight;
}

var GREEN_ARROW_RETURN = { isReturn: true };

function getGreenArrowsForScene(sceneId) {
  var list = [];
  if (!sceneId || !window.greenArrowConfig || !window.greenArrowConfig.arrows.length) return list;
  for (var i = 0; i < window.greenArrowConfig.arrows.length; i++) {
    var a = window.greenArrowConfig.arrows[i];
    if (a.sceneId === sceneId) list.push(a);
  }
  return list;
}

function findGreenArrowByDirection(candidates, which) {
  var wantDown = which === 'down';
  var i, a, tid;
  for (i = 0; i < candidates.length; i++) {
    a = candidates[i];
    tid = resolveSceneId(a.targetSceneId) || a.targetSceneId;
    if (!isGreenArrowAllowed(a, tid)) continue;
    var isDown = a.direction === 'down';
    if (wantDown === isDown) return a;
  }
  if (!wantDown) {
    for (i = 0; i < candidates.length; i++) {
      a = candidates[i];
      if (a.direction === 'down') continue;
      tid = resolveSceneId(a.targetSceneId) || a.targetSceneId;
      if (!isGreenArrowAllowed(a, tid)) continue;
      return a;
    }
  }
  return null;
}

function findGreenArrowInAngleRange(candidates, yawDeg, which) {
  var wantDown = which === 'down';
  var i, a, tid;
  for (i = 0; i < candidates.length; i++) {
    a = candidates[i];
    tid = resolveSceneId(a.targetSceneId) || a.targetSceneId;
    if (!isGreenArrowAllowed(a, tid)) continue;
    if (!isAngleInRangeDeg(yawDeg, a.startAngle, a.endAngle)) continue;
    var isDown = a.direction === 'down';
    if (wantDown === isDown) return a;
  }
  if (!wantDown) {
    for (i = 0; i < candidates.length; i++) {
      a = candidates[i];
      if (a.direction === 'down') continue;
      tid = resolveSceneId(a.targetSceneId) || a.targetSceneId;
      if (!isGreenArrowAllowed(a, tid)) continue;
      if (isAngleInRangeDeg(yawDeg, a.startAngle, a.endAngle)) return a;
    }
  }
  return null;
}

/**
 * з·‘пјқйқ’гҒ®дёҠдёӢзүҲгҖӮгғҸгғ–гҒҜй»„гҒЁеҗҢгҒҳжЁӘиҰӢгҒҲгҒ§з·‘дёҠдёӢпјҲи§’еәҰзҜ„еӣІгҒҜдҪҝгӮҸгҒӘгҒ„пјүгҖӮ
 */
function getGreenArrow(which) {
  if (!currentSceneObj || !window.greenArrowConfig || !window.greenArrowConfig.arrows.length) return null;
  var sceneId = currentSceneObj.data.id;
  var candidates = getGreenArrowsForScene(sceneId);
  if (!candidates.length) return null;
  var hub = isCrossCourseHub(sceneId);

  if (hub) {
    if (!isViewHorizontalForCrossCourse() && !hasActiveSideReturn()) return null;
    if (which === 'down' && hasActiveSideReturn()) return GREEN_ARROW_RETURN;
    if (which === 'up' && hasActiveSideReturn()) return null;
    return findGreenArrowByDirection(candidates, which);
  }

  var yawDeg = getGreenArrowViewYawDeg();
  if (which === 'down') {
    if (hasActiveSideReturn()) return GREEN_ARROW_RETURN;
    return findGreenArrowInAngleRange(candidates, yawDeg, 'down');
  }
  return findGreenArrowInAngleRange(candidates, yawDeg, 'up');
}

function shouldShowGreenArrow(which) {
  if (!currentSceneObj) return false;
  var sceneId = currentSceneObj.data.id;
  var candidates = getGreenArrowsForScene(sceneId);
  if (!candidates.length) return false;
  var hub = isCrossCourseHub(sceneId);
  if (hub) {
    if (which === 'down' && hasActiveSideReturn()) return true;
    if (which === 'up' && hasActiveSideReturn()) return false;
    if (!isViewHorizontalForCrossCourse()) return false;
    return !!getGreenArrow(which);
  }
  if (which === 'down' && hasActiveSideReturn()) return true;
  var yawDeg = getGreenArrowViewYawDeg();
  return !!findGreenArrowInAngleRange(candidates, yawDeg, which);
}

function updateGreenArrows() {
  var upEl = document.getElementById('arrowUpGreen');
  var downEl = document.getElementById('arrowDownGreen');
  if (upEl) { upEl.style.visibility = 'hidden'; upEl.classList.remove('visible'); }
  if (downEl) { downEl.style.visibility = 'hidden'; downEl.classList.remove('visible'); }
}

function jumpByGreenArrow(direction) {
  if (direction === 'down' && returnToSideRouteOrigin()) {
    console.log('рҹҹў GREEN DOWN: е…ғгӮ·гғјгғігҒёжҲ»гӮӢпјҲreturnSceneпјү');
    return;
  }

  var arrow = getGreenArrow(direction === 'down' ? 'down' : 'up');
  if (!arrow || arrow.isReturn) return;
  var targetId = resolveSceneId(arrow.targetSceneId) || arrow.targetSceneId;
  if (!isGreenArrowAllowed(arrow, targetId)) return;
  var targetObj = scenesData[targetId];
  if (!targetObj) {
    console.warn('вҡ пёҸ з·‘зҹўеҚ°: йҒ·з§»е…ҲгӮ·гғјгғігҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“:', arrow.targetSceneId);
    return;
  }
  var departureYaw = currentView.parameters().yaw;
  var fromSceneId = currentSceneObj.data.id;
  var returningToMain = isSideRoute(fromSceneId) && !isSideRoute(targetId) && !isPortalRoute(targetId);
  // й»„гғ»йқ’гҒЁеҗҢгҒҳпјҡз§»еӢ•е…ҲгҒё yaw/pitch гӮ’еј•гҒҚз¶ҷгҒҗпјҲmap гҒ® yaw/pitch иЈңжӯЈгҒҜдҪҝгӮҸгҒӘгҒ„пјү
  var targetYaw = getRelativeSceneYaw(targetId);
  var targetPitch = getRelativeScenePitch(targetId);

  console.log('рҹҹў GREEN ' + (direction === 'down' ? 'DOWN' : 'UP') + ': ' + fromSceneId + ' вҶ’ ' + targetId);

  if (returningToMain) {
    window.returnScene = null;
    window.returnEntryScene = null;
    window.departureYaw = null;
    window.departurePitch = null;
    window.entryInitialYaw = null;
    window.entryYawOffset = 0;
    window.entryPitch = null;
    window.allowYellowSideReturn = false;
  } else {
    window.returnScene = fromSceneId;
    window.returnEntryScene = targetId;
    window.departureYaw = departureYaw;
    window.departurePitch = currentView.parameters().pitch;
    window.targetSceneId = targetId;
    window.entryInitialYaw = targetObj.data.initialViewParameters.yaw;
    window.entryYawOffset = 0;
    window.entryPitch = targetPitch;
    window.allowYellowSideReturn = !isLateralViewpointMove(fromSceneId, targetId);
  }

  switchScene(targetId, targetYaw, targetPitch, currentView.parameters().fov, true);
}

function getBlueArrow(side) {
  if (!currentSceneObj || !window.blueArrowConfig || !window.blueArrowConfig.arrows.length) return null;
  // йқ’пјқе·ҰеҸігӮ№гғӯгғғгғҲгҖӮжӯЈйқўгҒ®гҒЁгҒҚгҒ гҒ‘пјҲй»„гҒ®дёҠдёӢгҒЁеҗҢжҷӮгҒ«еҮәгӮӢпјү
  if (!isViewForwardForCrossCourse()) return null;
  for (var i = 0; i < window.blueArrowConfig.arrows.length; i++) {
    var arrow = window.blueArrowConfig.arrows[i];
    if (arrow.sceneId === currentSceneObj.data.id && arrow.side === side) return arrow;
  }
  return null;
}

function updateBlueArrows() {
  var leftEl = document.getElementById('arrowBlueLeft');
  var rightEl = document.getElementById('arrowBlueRight');
  if (leftEl) { leftEl.style.visibility = 'hidden'; leftEl.classList.remove('visible'); }
  if (rightEl) { rightEl.style.visibility = 'hidden'; rightEl.classList.remove('visible'); }
}

function isLateralViewpointMove(fromSceneId, targetSceneId) {
  var fromObj = scenesData[fromSceneId];
  var targetObj = scenesData[targetSceneId];
  if (!fromObj || !targetObj) return false;
  var fromCourse = sceneCourseKey(fromObj.data);
  var targetCourse = sceneCourseKey(targetObj.data);
  if (fromCourse === 'aa' || targetCourse === 'aa') return false;
  return fromCourse !== targetCourse;
}

function jumpByBlueArrow(side) {
  var arrow = getBlueArrow(side);
  if (!arrow) return;
  var targetId = resolveSceneId(arrow.targetSceneId) || arrow.targetSceneId;
  var targetObj = scenesData[targetId];
  if (!targetObj) {
    console.warn('вҡ пёҸ йқ’зҹўеҚ°: йҒ·з§»е…ҲгӮ·гғјгғігҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“:', arrow.targetSceneId);
    return;
  }
  var yawOff = arrow.yawOffset ? degToRad(parseFloat(arrow.yawOffset)) : 0;
  var pitchOff = arrow.pitchOffset ? degToRad(parseFloat(arrow.pitchOffset)) : 0;
  var targetYaw = normalizeAngle(getRelativeSceneYaw(targetId) + yawOff);
  var targetPitch = getRelativeScenePitch(targetId) + pitchOff;

  window.returnScene = currentSceneObj.data.id;
  window.returnEntryScene = targetId;
  window.departureYaw = currentView.parameters().yaw;
  window.departurePitch = currentView.parameters().pitch;
  window.entryInitialYaw = targetObj.data.initialViewParameters.yaw;
  window.entryYawOffset = 0;
  window.entryPitch = targetPitch;
  window.allowYellowSideReturn = false;

  switchScene(targetId, targetYaw, targetPitch, currentView.parameters().fov, true);
}

function getGreenArrowTargetPitch(targetId, pitchOffsetRad) {
  return getRelativeScenePitch(targetId) + (pitchOffsetRad || 0);
}

function isPortalRoute(id) {
  var obj = scenesData[id];
  if (obj && obj.data) {
    return obj.data.direction === 'portal' || sceneCourseKey(obj.data) === 'dd';
  }
  var scene = window.APP_DATA.scenes.find(function(s) { return s.id === id; });
  return !!(scene && (scene.direction === 'portal' || sceneCourseKey(scene) === 'dd'));
}

function maxPositionForCourse(course) {
  var max = -Infinity;
  for (var id in scenesData) {
    var sd = scenesData[id].data;
    if (sceneCourseKey(sd) === course) max = Math.max(max, Number(sd.position));
  }
  return isFinite(max) ? max : null;
}

function isGreenArrowAllowed(arrow, targetId) {
  if (!currentSceneObj || currentSceneObj.data.id !== arrow.sceneId) return false;
  if (isPortalRoute(targetId)) {
    var currentCourse = sceneCourseKey(currentSceneObj.data);
    var maxPos = maxPositionForCourse(currentCourse);
    // dd гҒҜгҖҢгӮігғјгӮ№зөӮзӮ№гҒӢгӮүгҒ®з·‘зҹўеҚ°гҒ§гҒ гҒ‘е…ҘгӮӢгҖҚе®үе…ЁејҒгҖӮB1 гҒӘгҒ©е…ҘеҸЈеҒҙгҒӢгӮүгҒ®иӘӨдҫөе…ҘгӮ’йҳІгҒҗгҖӮ
    if (maxPos !== null && Number(currentSceneObj.data.position) !== maxPos) return false;
  }
  return true;
}

function hasActiveSideReturn() {
  return !!(
    window.returnScene &&
    scenesData[window.returnScene] &&
    window.returnEntryScene &&
    currentSceneObj &&
    currentSceneObj.data.id === window.returnEntryScene
  );
}

function resolveSideRouteReturnSceneId() {
  if (hasActiveSideReturn()) return window.returnScene;
  return null;
}

function returnToSideRouteOrigin() {
  var returnSceneId = resolveSideRouteReturnSceneId();
  if (!returnSceneId) return false;
  var returnYaw;
  var returnPitch;
  if (window.departureYaw !== null && window.departureYaw !== undefined) {
    var currentYaw = currentView.parameters().yaw;
    var entryBaseYaw = (window.entryInitialYaw || 0) + (window.entryYawOffset || 0);
    var sideYawOffset = normalizeAngle(currentYaw - entryBaseYaw);
    returnYaw = normalizeAngle(window.departureYaw + sideYawOffset);
  } else {
    returnYaw = getRelativeSceneYaw(returnSceneId);
  }
  // pitch гӮӮ yaw гҒЁеҗҢж§ҳпјҡи„ҮйҒ“еҶ…гҒ§еӨүгҒҲгҒҹиҰӢдёҠгҒ’/иҰӢдёӢгҒ’гҒ®е·®гӮ’гҖҒжҲ»гӮҠе…ҲгҒ«еҸҚжҳ гҒҷгӮӢ
  if (window.departurePitch !== null && window.departurePitch !== undefined) {
    if (window.entryPitch !== null && window.entryPitch !== undefined && currentView) {
      var sidePitchOffset = currentView.parameters().pitch - window.entryPitch;
      returnPitch = window.departurePitch + sidePitchOffset;
    } else {
      returnPitch = window.departurePitch;
    }
    var pitchClamp = Math.PI / 2 - 0.05;
    returnPitch = Math.max(-pitchClamp, Math.min(pitchClamp, returnPitch));
  } else {
    returnPitch = getRelativeScenePitch(returnSceneId);
  }

  console.log(
    'рҹҡҖ и„ҮйҒ“е…ҘеҸЈ вҶ’ е…ғгӮ·гғјгғігҒ«жҲ»гӮӢ: ' + returnSceneId +
    ' yaw=' + radToDeg(normalizeAngle(returnYaw)).toFixed(1) + 'В°' +
    ' pitch=' + radToDeg(returnPitch).toFixed(1) + 'В°'
  );
  window.returnScene = null;
  window.returnEntryScene = null;
  window.departureYaw = null;
  window.departurePitch = null;
  window.entryInitialYaw = null;
  window.entryYawOffset = 0;
  window.entryPitch = null;
  window.allowYellowSideReturn = false;
  switchScene(returnSceneId, returnYaw, returnPitch, currentView.parameters().fov);
  return true;
}

function getSceneInterstitialConfig(sceneData, isUp) {
  if (!sceneData) return null;
  var key = isUp ? 'up' : 'down';
  if (sceneData.sceneInterstitial && sceneData.sceneInterstitial[key]) {
    return sceneData.sceneInterstitial[key];
  }
  if (sceneData.arrowClip && sceneData.arrowClip[key]) {
    return sceneData.arrowClip[key];
  }
  return null;
}

function executeMoveWithSideBranch(isUp) {
  // жҢҜгӮҠеҗ‘гҒ„гҒҰй»„зҹўеҚ°гҒ§жҲ»гӮӢгҒЁгҒҚгҒҜгҖҒеҲ°зқҖеҫҢгҒ®гғһгғғгғ—жҢҮе®ҡиҮӘеӢ•еҶҚз”ҹгӮ’жҠ‘жӯўпјҲй•·жҠјгҒ—иҮӘеӢ•гҒҜеҫ“жқҘгҒ©гҒҠгӮҠпјү
  if (!isUp && isYellowLookingForward()) {
    // жӯЈйқўгҒ®гҒҫгҒҫдёӢзҹўеҚ°1еӣһпјқ1гӮігғһжҲ»гӮҠгҖӮеҲ°зқҖе…ҲгҒҢиҮӘеӢ•еҢәй–“гҒ§гӮӮеӢқжүӢгҒ«еүҚйҖІгҒ—гҒӘгҒ„
    yellowAutoMovePaused = true;
    if (yellowAutoMoveTimer) { clearTimeout(yellowAutoMoveTimer); yellowAutoMoveTimer = null; }
    if (yellowAutoMoveStartTimer) { clearTimeout(yellowAutoMoveStartTimer); yellowAutoMoveStartTimer = null; }
  } else {
    yellowAutoMovePaused = !isYellowLookingForward();
  }
  markYellowAutoEnterViaArrowIfForward(isUp);
  var dir = isUp ? 'up' : 'down';
  if (currentSceneObj && isSideRoute(currentSceneObj.data.id)) {
    var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
    var chainDelta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
    if (findSideRouteChainSceneId(chainDelta)) {
      executeMove(isUp);
      return;
    }
  }
  if (trySideBranchMove(dir)) return;
  executeMove(isUp);
}

/** дёҠпјҸдёӢзҹўеҚ°гҒ®й•·жҠјгҒ—пјҲзҙ„0.5з§’пјүгҒ§ sceneInterstitial гӮ’еҶҚз”ҹпјҲзҹӯжҠјгҒ—гҒҜйҖҡеёёгҒ®1гӮігғһз§»еӢ•пјү */
function trySceneInterstitialOnLongPress(isUp) {
  return trySceneInterstitial(isUp);
}

/** е…Ёз”»йқўеӢ•з”»гҒ®гҒӮгҒЁпјҡгӮӘгғјгғҗгғјгғ¬гӮӨгӮ’ж®ӢгҒ—гҒҹгҒҫгҒҫ pano гӮ’еҲҮгӮҠжӣҝгҒҲгҖҒгҒӢгӮүгӮӘгғјгғҗгғјгғ¬гӮӨгӮ’гғ•гӮ§гғјгғүгӮўгӮҰгғҲ */
function finishSceneInterstitialTransition(targetId) {
  switchScene(
    targetId,
    getRelativeSceneYaw(targetId),
    getRelativeScenePitch(targetId),
    currentView.parameters().fov,
    true,
    true
  );
  setTimeout(function() {
    hideFullscreenVideo(false, false);
  }, 720);
}

function trySceneInterstitial(isUp) {
  if (!currentSceneObj || !currentSceneObj.data) return false;
  var cfg = getSceneInterstitialConfig(currentSceneObj.data, isUp);
  if (!cfg) return false;

  var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
  if (cfg.whenLooking === 'front' && !isLookingFront) return false;
  if (cfg.whenLooking === 'back' && isLookingFront) return false;

  var targetId = cfg.targetScene;
  if (!targetId || !scenesData[targetId]) {
    console.warn('вҡ пёҸ sceneInterstitial: йҒ·з§»е…ҲгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“', targetId);
    return false;
  }

  function goTargetInstant() {
    switchScene(
      targetId,
      getRelativeSceneYaw(targetId),
      getRelativeScenePitch(targetId),
      currentView.parameters().fov,
      true
    );
  }

  var videoSrc = cfg.videoSrc || cfg.mp4;
  if (videoSrc && isSupportedVideoSrc(videoSrc)) {
    console.log('рҹҺ¬ гӮ·гғјгғій–“жҢҝе…Ҙ(2DеӢ•з”»): ' + currentSceneObj.data.id + ' вҶ’ ' + targetId + ' / ' + videoSrc);
    fadeOutBgmForVideo();
    showFullscreenVideo(videoSrc, {
      loop: cfg.loop === true,
      manualEnd: true,
      onEnd: function() {
        finishSceneInterstitialTransition(targetId);
      }
    });
    return true;
  }

  var seq = cfg.frameSequence;
  if (seq && resolveFrameSequenceUrls(seq).length) {
    console.log('рҹҺһ гӮ·гғјгғій–“жҢҝе…Ҙ(йҖЈз•Әз”»еғҸ): ' + currentSceneObj.data.id + ' вҶ’ ' + targetId);
    showFrameSequence(seq, {
      manualEnd: true,
      onEnd: function() {
        finishSceneInterstitialTransition(targetId);
      },
      preferPanorama: seq.vr === true
    });
    return true;
  }

  if (cfg.skipOnly === true || cfg.instant === true) {
    console.log('вҸӯ гӮ·гғјгғій–“гӮ·гғ§гғјгғҲгӮ«гғғгғҲ: ' + currentSceneObj.data.id + ' вҶ’ ' + targetId);
    goTargetInstant();
    return true;
  }

  return false;
}

function executeMove(isUp) {
  var yaw = normalizeAngle(currentView.parameters().yaw);
  var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
  
  // вҳ…зү№еҲҘгӮұгғјгӮ№1пјҲз„ЎеҠ№еҢ–пјүпјҡе·ҰеҒҙгӮігғјгӮ№жңҖеҲқгҒ®гӮ·гғјгғі вҶ’ еҸіеҒҙгӮігғјгӮ№з§»еӢ•гҒҜгҖҢжүүгӮҜгғӘгғғгӮҜгҖҚгҒ§гҒ®гҒҝ
  
  // вҳ…зү№еҲҘгӮұгғјгӮ№2пјҡе·ҰеҒҙгӮігғјгӮ№ вҶ’ main гҒ«жҲ»гӮӢ
  // иӨҮж•°жһҡгҒ®bb/ccгҒ§гҒҜгҖҒдёҠзҹўеҚ°гӮ’жҠјгҒ—гҒҹжҷӮгҒ«е…ҲгҒ®гӮ·гғјгғігҒҢгҒӮгӮҢгҒ°жң¬з·ҡгҒёжҲ»гҒ•гҒӘгҒ„гҖӮ
  if (currentSceneObj.data.direction === "left" && currentSceneObj.data.position === 1) {
    var shouldReturn = (isLookingFront && !isUp) || (!isLookingFront && isUp);
    if (shouldReturn) {
      if (returnToSideRouteOrigin()) {
        return;
      }
      return;
    }
  }
  
  // вҳ…зү№еҲҘгӮұгғјгӮ№4пјҡгғқгғјгӮҝгғ«е°Ӯз”ЁгӮ·гғјгғіпјҲи„ҮйҒ“еҮҰзҗҶгӮ’гӮ№гӮӯгғғгғ—пјү
  if (currentSceneObj.data.direction === "portal") {
    console.log('рҹҺҺ гғқгғјгӮҝгғ«е°Ӯз”ЁгӮ·гғјгғігҒ§гҒҷгҖӮи„ҮйҒ“з§»еӢ•гҒ§гҒҚгҒҫгҒӣгӮ“гҖӮ');
    return;
  }
  
  // bb/ccпјҡжӯЈйқўгҒӘгӮүдёҠгҒ§ж¬ЎгҒёгғ»дёӢгҒ§жҲ»гӮӢгҖҒеҫҢгӮҚеҗ‘гҒҚгҒӘгӮүдёӢгҒ§ж¬ЎгҒёгғ»дёҠгҒ§жҲ»гӮӢпјҲaa гҒЁеҗҢгҒҳиҖғгҒҲж–№пјү
  if (isSideRoute(currentSceneObj.data.id)) {
    var chainDelta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
    var chainNextId = findSideRouteChainSceneId(chainDelta);
    if (chainNextId) {
      if (sceneCourseKey(currentSceneObj.data) === 'cc') {
        switchCcChainScene(chainNextId);
      } else {
        switchScene(chainNextId, getRelativeSceneYaw(chainNextId), getRelativeScenePitch(chainNextId), currentView.parameters().fov);
      }
      return;
    }
    if (chainDelta < 0 && window.allowYellowSideReturn && returnToSideRouteOrigin()) {
      return;
    }
    return;
  }

  // aa гҒ§гҒ®йҖҡеёёгҒ®з§»еӢ•еҮҰзҗҶпјҲй»„иүІзҹўеҚ°пјү
  // вҳ…2жңҲзүҲгҒ®гғӯгӮёгғғгӮҜеҫ©е…ғпјҡdirection гӮ’иҖғж…®гҖҒexecuteMoveByDeltaдҪҝз”Ё
  var delta;
  if (currentSceneObj.data.direction === 'iki') {
    // иЎҢгҒҚгӮ·гғјгғіпјҡжӯЈйқўгҒӘгӮүйҖІгӮҖ/дёӢгҒҢгӮӢгҖҒеҫҢгӮҚгҒӘгӮүдёӢгҒҢгӮӢ/йҖІгӮҖ
    delta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  } else {
    // её°гӮҠгӮ·гғјгғіпјҡжӯЈйқўгҒӘгӮүдёӢгҒҢгӮӢ/йҖІгӮҖгҖҒеҫҢгӮҚгҒӘгӮүйҖІгӮҖ/дёӢгҒҢгӮӢ
    delta = isUp ? (isLookingFront ? -1 : 1) : (isLookingFront ? 1 : -1);
  }
  if (flipDir) delta = -delta;
  executeMoveByDelta(delta);
}

// вҳ… иҮӘеӢ•еҶҚз”ҹпјҲгӮәгғјгғ гӮӨгғігҒ®гҒҝгғ»й»’з”»йқўгҒӘгҒ—пјүгӮігғјгӮ№гҒ”гҒЁе®Ңе…ЁзӢ¬з«Ӣдҝқеӯҳ
var autoMoveInterval_ms=1875;
var breathMax=75,breathMin=75,breathFov=breathMax,autoFadePct;
var autoMoveTimer=null,autoMoveInterval=null,autoZoomInterval=null;
var autoMoveActive=false,autoStepping=false;
var yellowAutoMovePaused=false;
var yellowAutoMoveRangeLimited=false;
var yellowAutoMoveEnterViaArrow=false;
var yellowAutoMoveTimer=null;
var yellowAutoMoveStartTimer=null;

function markYellowAutoEnterViaArrowIfForward(isUp) {
  if (!isUp || !isYellowLookingForward() || !currentSceneObj || !currentView) return;
  if (yellowAutoMovePaused) return;
  var delta = computeMoveDelta(isUp);
  if (!delta) return;
  var targetId = findSceneIdByDelta(delta);
  if (targetId && scenesData[targetId] && sceneYellowAutoMoveEnabled(scenesData[targetId].data)) {
    yellowAutoMoveEnterViaArrow = true;
  }
}

function scheduleYellowAutoMoveAfterSwitch(sceneId, crossfadeDur) {
  if (yellowAutoMoveTimer) {
    clearTimeout(yellowAutoMoveTimer);
    yellowAutoMoveTimer = null;
  }
  if (yellowAutoMoveStartTimer) {
    clearTimeout(yellowAutoMoveStartTimer);
    yellowAutoMoveStartTimer = null;
  }
  if (typeof embedPlacerMode !== 'undefined' && embedPlacerMode) return;
  if (autoMoveActive) return;
  var viaArrow = yellowAutoMoveEnterViaArrow;
  yellowAutoMoveEnterViaArrow = false;
  // й»„зҹўеҚ°1еӣһгҒ§иҮӘеӢ•еҢәй–“гҒё: гғ•гӮ§гғјгғүдёӯгҒӢгӮүгӮәгғјгғ пјӢй–“йҡ”гӮҝгӮӨгғһгғјй–Ӣе§ӢпјҲ14д»ҘйҷҚгҒЁеҗҢгҒҳгғӘгӮәгғ пјү
  // гғһгғғгғ—зӯүгҒӢгӮүгҒ®е…Ҙе®Ө: еҗ‘гҒҚеҶҚйҒ©з”ЁеҫҢгҒҷгҒҗпјҲ500ms гҒ®й•·жҠјгҒ—еҫ…гҒЎгҒҜдёҚиҰҒпјү
  var wait = viaArrow ? 0 : Math.max(80, (crossfadeDur || 700) + 80);
  yellowAutoMoveTimer = setTimeout(function() {
    yellowAutoMoveTimer = null;
    if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
    if (autoMoveActive || yellowAutoMovePaused) return;
    maybeStartYellowAutoMove(true);
  }, wait);
}

function maybeStartYellowAutoMove(skipHoldDelay) {
  if (typeof embedPlacerMode !== 'undefined' && embedPlacerMode) return;
  if (autoMoveActive || yellowAutoMovePaused) return;
  if (!currentSceneObj || !currentView) return;
  if (!sceneYellowAutoMoveEnabled(currentSceneObj.data)) return;
  if (currentSceneObj.data.direction === 'portal') return;
  if (!isYellowLookingForward()) return;
  var isUp = computeAutoMoveIsUpForDelta(1);
  var nextId = peekNextSceneIdForMove(isUp);
  if (!nextId || !scenesData[nextId] || !sceneYellowAutoMoveEnabled(scenesData[nextId].data)) {
    return;
  }
  if (yellowAutoMoveStartTimer) clearTimeout(yellowAutoMoveStartTimer);
  if (skipHoldDelay) {
    yellowAutoMoveRangeLimited = true;
    startYellowAutoMove(isUp);
    return;
  }
  yellowAutoMoveStartTimer = setTimeout(function() {
    yellowAutoMoveStartTimer = null;
    if (autoMoveActive || yellowAutoMovePaused) return;
    if (!currentSceneObj || !currentView) return;
    if (!sceneYellowAutoMoveEnabled(currentSceneObj.data)) return;
    if (!isYellowLookingForward()) return;
    yellowAutoMoveRangeLimited = true;
    startYellowAutoMove(isUp);
  }, 500);
}

function startYellowAutoMove(isUp) {
  if (autoMoveActive || !currentView || !currentSceneObj) return;
  if (trySceneInterstitialOnLongPress(!!isUp)) return;
  autoMoveActive = true;
  autoFadePct = readAutoFadePctFromSlider();
  var startYaw = currentView.parameters().yaw;
  if (isUp) startContinuousZoom();
  autoMoveInterval = setInterval(function() {
    autoStepOnce(isUp, startYaw);
  }, autoMoveInterval_ms);
  console.log('в–¶ й»„зҹўеҚ° иҮӘеӢ•йҖЈз¶ҡеҶҚз”ҹй–Ӣе§Ӣ: ' + currentSceneObj.data.id +
    (yellowAutoMoveRangeLimited ? 'пјҲжҢҮе®ҡеҢәй–“гғ»й•·жҠјгҒ—гҒЁеҗҢгҒҳеӢ•гҒҚпјү' : ''));
}

// иҮӘеӢ•еҶҚз”ҹиЁӯе®ҡгҒҜдҪңе“ҒгӮ’й–ӢгҒҚзӣҙгҒ—гҒҰгӮӮеӢқжүӢгҒ«жҲ»гӮүгҒӘгҒ„гӮҲгҒҶгҖҒе°Ӯз”ЁгӮӯгғјгҒ§еӣәе®ҡдҝқеӯҳгҒҷгӮӢгҖӮ
function _ck(){return 'marzipano_auto_settings_v3_';}
function _save(k,v){try{localStorage.setItem(_ck()+k,String(v));}catch(e){}}
function _load(k,def){try{var v=localStorage.getItem(_ck()+k);return v!==null?v:def;}catch(e){return def;}}

function applyAutoMoveSettings() {
  var s=Math.max(1,Math.min(9,parseInt(_load('speed','6'))));
  var z=migrateZoomSliderValue(_load('zoom','2'));
  var f=Math.max(1,Math.min(9,parseInt(_load('fade','8'))));
  document.getElementById('speedSlider').value=s;
  autoMoveInterval_ms=speedToMs(s);
  document.getElementById('speedVal').textContent=speedLabels[s]||s;
  document.getElementById('zoomSlider').value=z;
  breathMin=zoomToMin(z);
  document.getElementById('zoomVal').textContent=zoomLabels[z]||(zoomRangeDeg(z)+'В°');
  document.getElementById('fadeSlider').value=f;
  autoFadePct=fadeToPct(f);
  document.getElementById('fadeVal').textContent=fadeLabels[f]||f;
}
applyAutoMoveSettings();

function readAutoFadePctFromSlider() {
  var el = document.getElementById('fadeSlider');
  if (!el) return autoFadePct || 0.875;
  return fadeToPct(parseInt(el.value, 10) || 8);
}

function startContinuousZoom(){
  if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  if(!currentView)return;
  var stepMs=50,range=breathMax-breathMin;
  if(range<=0)return;
  var curFov=radToDeg(currentView.parameters().fov);
  var breathFov,endFov;
  if(curFov<breathMin-0.05){
    breathFov=curFov;
    endFov=curFov-range;
  }else{
    endFov=Math.max(breathMin-0.05,curFov-range);
    breathFov=curFov;
    if(breathFov-endFov<0.01){endFov=breathFov;}
  }
  if(Math.abs(breathFov-endFov)<0.005)return;
  var degsPerStep=Math.abs(breathFov-endFov)/(autoMoveInterval_ms/stepMs);
  autoZoomInterval=setInterval(function(){
    if(!autoMoveActive||!currentView){clearInterval(autoZoomInterval);autoZoomInterval=null;return;}
    if(breathFov>endFov){
      breathFov-=degsPerStep;
      if(breathFov<endFov)breathFov=endFov;
    }
    currentView.setParameters({fov:degToRad(breathFov)});
  },stepMs);
}
function stopAutoMove(fromUser){
  if(fromUser) yellowAutoMovePaused = true;
  if(autoMoveTimer){clearTimeout(autoMoveTimer);autoMoveTimer=null;}
  if(yellowAutoMoveStartTimer){clearTimeout(yellowAutoMoveStartTimer);yellowAutoMoveStartTimer=null;}
  if(autoMoveInterval){clearInterval(autoMoveInterval);autoMoveInterval=null;}
  if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  autoMoveActive=false;autoStepping=false;
  yellowAutoMoveRangeLimited=false;
  breathFov=breathMax;
  if(currentView)currentView.setParameters({fov:degToRad(breathFov)});}
function autoStepOnce(isUp,startYaw){if(!autoMoveActive||autoStepping)return;
  if(Math.abs(radToDeg(normalizeAngle(currentView.parameters().yaw-startYaw)))>90){stopAutoMove(false);return;}
  if (yellowAutoMoveRangeLimited && !isYellowLookingForward()) {
    stopAutoMove(false);
    return;
  }
  autoStepping=true;if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  var sceneBefore=currentSceneObj;executeMove(isUp);
  if(currentSceneObj===sceneBefore){stopAutoMove(false);return;}
  autoStepping=false;
  if (yellowAutoMoveRangeLimited) {
    var nextId = peekNextSceneIdForMove(isUp);
    if (!nextId || !scenesData[nextId] || !sceneYellowAutoMoveEnabled(scenesData[nextId].data)) {
      stopAutoMove(false);
      return;
    }
  }
  if(isUp)startContinuousZoom();}
function setupArrow(btnId,isUp){var btn=document.getElementById(btnId);
  function onPress(){if(autoMoveActive){stopAutoMove(true);return;}
    autoMoveTimer=setTimeout(function(){
      autoMoveTimer=null;
      if(trySceneInterstitialOnLongPress(isUp)) return;
      yellowAutoMovePaused = false;
      yellowAutoMoveRangeLimited = false;
      startYellowAutoMove(isUp);
    },500);}
  function onRelease(){if(autoMoveTimer){clearTimeout(autoMoveTimer);autoMoveTimer=null;
    if(!autoMoveActive)executeMoveWithSideBranch(isUp);}}
  btn.addEventListener('mousedown',onPress);
  btn.addEventListener('touchstart',function(e){e.preventDefault();onPress();});
  btn.addEventListener('mouseup',onRelease);btn.addEventListener('touchend',onRelease);}

setupArrow('arrowUp', true);
setupArrow('arrowDown', false);


// вҳ…гӮ·гғігғ—гғ«гҒӘдёҠдёӢзҹўеҚ°еҮҰзҗҶпјҲpitchдҝқжҢҒпјү
function executeMoveSimple(isUp) {
  // вҳ…2жңҲзүҲгҒ®гғӯгӮёгғғгӮҜеҫ©е…ғпјҡdirection гӮ’иҖғж…®
  if (!currentSceneObj) return;
  
  // вҳ…гғқгғјгӮҝгғ«гӮ·гғјгғіпјҲdd001пјүгҒ§гҒҜдёҠдёӢзҹўеҚ°гӮ’з„ЎеҠ№еҢ–
  if (currentSceneObj.data.id === '17-dd001') return;
  if (currentSceneObj.data.direction === 'portal') return;
  
  var isLookingFront = Math.abs(getGreenArrowViewYawDeg()) <= 90;
  
  var delta;
  if (currentSceneObj.data.direction === 'iki') {
    delta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  } else {
    delta = isUp ? (isLookingFront ? -1 : 1) : (isLookingFront ? 1 : -1);
  }
  
  executeMoveByDelta(delta);
}

// гӮҜгғӘгғғгӮҜжҷӮгҒҜзӣҙжҺҘexecuteMoveSimplifгӮ’е‘јгҒіеҮәгҒҷ
// вҳ…дёҠдёӢзҹўеҚ°гҒҜ setupArrow гҒ§еҮҰзҗҶпјҲclick гӮӨгғҷгғігғҲгғҸгғігғүгғ©гғјгҒҜеүҠйҷӨпјү

// е·ҰеҸізҹўеҚ°гҒЁз·‘зҹўеҚ°гҒ®гҒҝ click гӮӨгғҷгғігғҲ
document.getElementById('arrowLeft').addEventListener('click', function() {
  if (autoMoveActive) { stopAutoMove(true); return; }
  executeSideMove('left');
});
document.getElementById('arrowRight').addEventListener('click', function() {
  if (autoMoveActive) { stopAutoMove(true); return; }
  executeSideMove('right');
});

function executeSideMove(dir) {
  if (!currentSceneObj) return;
  if (trySideBranchMove(dir)) return;
  if (currentSceneObj.data.id === '17-dd001') return;
  if (currentSceneObj.data.direction === 'portal') return;

  var ccIdx = ccChainIndexForSceneId(currentSceneObj.data.id);
  if (ccIdx != null) {
    var relYawDeg = getGreenArrowViewYawDeg();
    var delta = relYawDeg < 0
      ? (dir === 'right' ? 1 : -1)
      : (dir === 'left' ? 1 : -1);
    if (flipDir) delta = -delta;
    var nextIdx = ccIdx + delta;
    if (CC_CHAIN_SCENE_IDS[nextIdx]) {
      switchCcChainScene(CC_CHAIN_SCENE_IDS[nextIdx]);
      return;
    }
    console.warn('вҡ пёҸ ccгӮігғјгӮ№з«Ҝ: C' + ccIdx + ' гҒӢгӮүгҒқгӮҢд»ҘдёҠгҒҜз§»еӢ•гҒ§гҒҚгҒҫгҒӣгӮ“');
    return;
  }

  var relYawDeg = getGreenArrowViewYawDeg();
  var delta;
  if (relYawDeg < 0) delta = (dir === 'right' ? 1 : -1);
  else delta = (dir === 'left' ? 1 : -1);
  if (flipDir) delta = -delta;
  executeMoveByDelta(delta);
}

function normalizeAngle(a) { while (a > Math.PI) a -= 2*Math.PI; while (a < -Math.PI) a += 2*Math.PI; return a; }

// вҳ… directionгғҷгғјгӮ№гҒ®еҲӨе®ҡпјҲжұҺз”ЁеҢ–пјү
function isLeftSide(id) {
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  return scene && scene.direction === "left";
}
function isRightSide(id) {
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  return scene && scene.direction === "right";
}

// вҳ… гғқгғјгӮҝгғ«гӮ·гғјгғідёҖиҰ§гӮ’еӢ•зҡ„гҒ«ж§ӢзҜү
var PORTAL_SCENES = [];
if (window.APP_DATA && window.APP_DATA.scenes) {
  window.APP_DATA.scenes.forEach(function(scene) {
    if (scene.direction === "portal") {
      PORTAL_SCENES.push(scene.id);
    }
  });
}
console.log('рҹ”№ PORTAL_SCENES (еӢ•зҡ„ж§ӢзҜү):', PORTAL_SCENES);

function isSideRoute(id) { 
  // вҳ…гғқгғјгӮҝгғ«е°Ӯз”ЁгӮ·гғјгғігҒҜи„ҮйҒ“гҒӢгӮүйҷӨеӨ–
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  if (scene && scene.direction === "portal") return false;
  return isLeftSide(id) || isRightSide(id); 
}

// з·‘зҹўеҚ°гӮҜгғӘгғғгӮҜжҷӮгҒ®еҲ°зқҖyawгӮ’иЁҲз®—
// yawOffset гҒҜгҖҢз§»еӢ•е…ҲгӮ·гғјгғігҒ®еҲқжңҹyawгҒӢгӮүгҒ®и§’еәҰпјҲеәҰпјүгҖҚгҒЁгҒ—гҒҰжүұгҒҶпјҲдҫӢ: -90 вҶ’ жӯЈйқўгҒҢ-90В°пјү
function computeGreenArrowTargetYaw(arrow, departureYaw, targetInitialYaw, fromSceneId) {
  var hasYawOffset = arrow.yawOffset !== undefined && arrow.yawOffset !== null && arrow.yawOffset !== '';
  var yawOffRad = hasYawOffset ? degToRad(parseFloat(arrow.yawOffset)) : 0;
  var targetId = resolveSceneId(arrow.targetSceneId) || arrow.targetSceneId;

  // еҗҢгҒҳиҰ–зӮ№гҒ®жЁӘз§»еӢ•пјҲbb/cc/ddпјүпјҡиҰӢгҒҰгҒ„гӮӢеҗ‘гҒҚгӮ’з¶ӯжҢҒпјҲmapгҒ®yawOffsetгҒҜдҪҝгӮҸгҒӘгҒ„пјү
  if (isLateralViewpointMove(fromSceneId, targetId)) {
    return getRelativeSceneYaw(targetId);
  }

  // и„ҮйҒ“пјҲbb/ccпјүвҶ’ жң¬з·ҡпјҲaaпјүгҒёжҲ»гӮӢ
  if (isSideRoute(fromSceneId) && !isSideRoute(arrow.targetSceneId)) {
    if (hasYawOffset) {
      return normalizeAngle(targetInitialYaw + yawOffRad);
    }
    if (window.departureYaw !== null) {
      return window.departureYaw;
    }
    if (isLeftSide(fromSceneId)) {
      return normalizeAngle(departureYaw + targetInitialYaw + degToRad(90));
    }
    if (isRightSide(fromSceneId)) {
      return normalizeAngle(departureYaw + targetInitialYaw - degToRad(90));
    }
    return departureYaw;
  }

  // жң¬з·ҡ вҶ’ и„ҮйҒ“пјҲbb/ccпјүгҒёе…ҘгӮӢ
  if (isLeftSide(arrow.targetSceneId) || isRightSide(arrow.targetSceneId)) {
    // жң¬з·ҡгҒӢгӮүи„ҮйҒ“гҒёе…ҘгӮӢжҷӮгҒҜгҖҒе…ғгҒ®еҗ‘гҒҚгҒ«еј•гҒҚгҒҡгӮүгӮҢгҒҡз§»еӢ•е…ҲгҒ®жӯЈйқўгӮ’еҗ‘гҒҸгҖӮ
    // еҝ…иҰҒгҒӘгӮү map_generator гҒ® yawиЈңжӯЈгҒ§ -90 / +90 гҒӘгҒ©гӮ’жҢҮе®ҡгҒҷгӮӢгҖӮ
    return normalizeAngle(targetInitialYaw + yawOffRad);
  }
  if (hasYawOffset) {
    return normalizeAngle(targetInitialYaw + yawOffRad);
  }
  return normalizeAngle(departureYaw + yawOffRad);
}

function degToRad(d) { return d * Math.PI / 180; }
function radToDeg(r) { return r * 180 / Math.PI; }
window.goToMap = function() {
  courseBgmSessionPlayed = {};
  activeBgmCourse = null;
  guideVideoSessionDone = {};
  stopAllBGM();
  var back = urlParams.get('back') || 'map.html';
  try {
    location.href = new URL(back, window.location.href).href;
  } catch (e0) {
    location.href = 'map.html';
  }
};

// ========================================
// вҳ… BGMеҶҚз”ҹз®ЎзҗҶ
// ========================================
function shouldPlayBGM() {
  return audioEnabled && bgmPlaying && (bgmEnabled || bgmForce);
}

function normalizeBgmItem(raw, defaultLoop, extra) {
  if (!raw) return null;
  var item;
  if (typeof raw === 'string') {
    item = { file: raw, loop: defaultLoop === true };
  } else if (typeof raw === 'object' && raw.file) {
    item = { file: raw.file, loop: raw.loop === true };
  }
  if (!item || !item.file) return null;
  if (extra) {
    Object.keys(extra).forEach(function(key) {
      item[key] = extra[key];
    });
  }
  return item;
}

/** гӮ·гғјгғігҒ® bgm / APP_DATA.sceneBgm / APP_DATA.courseBgm */
function normalizeBgmItems(sceneData) {
  if (!sceneData) return null;
  var items = [];
  var raw = sceneData.bgm;
  if (Array.isArray(raw)) {
    items = raw.map(function(item) {
      return normalizeBgmItem(item, false);
    });
  } else if (typeof raw === 'string') {
    items = raw.split(' ').map(function(s) { return s.trim(); }).filter(Boolean).map(function(f) { return normalizeBgmItem(f, false); });
  } else {
    var sb = data.sceneBgm || (window.APP_DATA && window.APP_DATA.sceneBgm);
    if (sb) {
      var sceneItem = sb[sceneData.id] || sb[sceneData.name];
      var normalizedSceneItem = normalizeBgmItem(sceneItem, false, { fromScene: true });
      if (normalizedSceneItem) items.push(normalizedSceneItem);
    }
  }
  items = items.filter(function(it) { return it && it.file; });
  if (items.length) return items;
  var cb = data.courseBgm || (window.APP_DATA && window.APP_DATA.courseBgm);
  if (cb && sceneData.course && cb[sceneData.course]) {
    var normalizedCourseItem = normalizeBgmItem(cb[sceneData.course], false, { fromCourse: true });
    if (normalizedCourseItem) return [normalizedCourseItem];
  }
  return null;
}

function sceneUsesCourseBgm(sceneData) {
  if (!sceneData || sceneData.bgm) return false;
  var cb = data.courseBgm || (window.APP_DATA && window.APP_DATA.courseBgm);
  return !!(cb && sceneData.course && cb[sceneData.course]);
}

function playSceneBGM(sceneId) {
  var sceneObj = scenesData[sceneId];
  if (!sceneObj) return;
  var course = sceneObj.data.course || null;

  // BGMжҢҮе®ҡгҒҢз„ЎгҒ„гӮігғјгӮ№гҒёе…ҘгҒЈгҒҹгӮүгҖҒеүҚгӮігғјгӮ№гҒ®йҹігӮ’гғ•гӮ§гғјгғүгӮўгӮҰгғҲгҒҷгӮӢгҖӮ
  var bgmItems = normalizeBgmItems(sceneObj.data);
  if (!bgmItems || !bgmItems.length) {
    stopAllBGM();
    activeBgmCourse = null;
    return;
  }

  if (!audioEnabled) return;
  if (!shouldPlayBGM()) {
    stopAllBGM();
    return;
  }

  // bbвҶ’aa гҒӘгҒ©гӮігғјгӮ№гҒҢеӨүгӮҸгҒЈгҒҹгӮүеүҚгӮігғјгӮ№гҒ®BGMгӮ’еҝ…гҒҡжӯўгӮҒгӮӢ
  if (course && activeBgmCourse && course !== activeBgmCourse) {
    stopAllBGM();
    activeBgmCourse = null;
  }

  var bgmFiles = bgmItems.map(function(item) { return item.file; }).filter(Boolean);
  if (bgmFiles.length === 0) {
    stopAllBGM();
    activeBgmCourse = null;
    return;
  }

  var primaryFile = bgmFiles[0];

  // еҗҢдёҖгӮігғјгӮ№гғ»еҗҢдёҖжӣІгҒҢж—ўгҒ«йіҙгҒЈгҒҰгҒ„гӮӢ вҶ’ гғ•гӮ§гғјгғүгӮ„гӮҠзӣҙгҒ—гҒ—гҒӘгҒ„пјҲйҹійҮҸдҪҺдёӢйҳІжӯўпјү
  if (primaryFile && bgmAudios[primaryFile]) {
    var cur = bgmAudios[primaryFile];
    if (!cur.paused && !cur.ended && cur.volume > 0.05) {
      if (cur.__fadeTimer) {
        clearInterval(cur.__fadeTimer);
        cur.__fadeTimer = null;
      }
      cur.volume = bgmVolume;
      cur.loop = resolveLoopFlag(primaryFile, bgmItems[0]);
      if (course) activeBgmCourse = course;
      return;
    }
  }

  var usesCourseBgmNow = bgmItems.some(function(item) { return item && item.fromCourse; });
  if (course && courseBgmSessionPlayed[course] && usesCourseBgmNow && !resolveLoopFlag(primaryFile, bgmItems[0])) {
    if (course) activeBgmCourse = course;
    return;
  }

  var newBGMSet = {};
  bgmFiles.forEach(function(file) { newBGMSet[file] = true; });

  Object.keys(bgmAudios).forEach(function(key) {
    if (!newBGMSet[key]) {
      fadeOutAudio(bgmAudios[key], function() {
        bgmAudios[key].pause();
        delete bgmAudios[key];
      });
    }
  });

  bgmItems.forEach(function(item) {
    var file = item.file;
    if (!file) return;
    if (!bgmAudios[file] || (bgmAudios[file].paused && !bgmAudios[file].ended)) {
      playAudio('sounds/' + file, {
        loop: resolveLoopFlag(file, item),
        course: (item.fromCourse && course) ? course : null
      });
      if (item.fromCourse && course) activeBgmCourse = course;
    } else {
      bgmAudios[file].loop = resolveLoopFlag(file, item);
      bgmAudios[file].volume = bgmVolume;
      if (item.fromCourse && course) activeBgmCourse = course;
    }
  });
}

function resolveLoopFlag(fileName, item) {
  if (item && item.loop === true) return true;
  return false;
}

function playAudio(filePath, opts) {
  opts = opts || {};
  var audio = new Audio(filePath);
  var key = filePath.replace('sounds/', '');
  audio.loop = !!opts.loop;
  audio.volume = 0;
  audio.__bgmCourse = opts.course || null;
  if (audio.__bgmCourse) courseBgmSessionPlayed[audio.__bgmCourse] = true;

  audio.addEventListener('canplay', function() {
    if (bgmSuppressedForVideo > 0) return;
    fadeInAudio(audio, bgmVolume, 500);
  });

  audio.addEventListener('error', function() {
    console.error('вқҢ BGMиӘӯиҫјгӮЁгғ©гғј:', filePath);
  });

  if (!audio.loop) {
    audio.addEventListener('ended', function() {
      if (audio.__bgmCourse) courseBgmSessionPlayed[audio.__bgmCourse] = true;
      if (bgmAudios[key] === audio) delete bgmAudios[key];
    });
  }

  audio.play().catch(function(err) {
    console.error('вқҢ BGMеҶҚз”ҹгӮЁгғ©гғј:', err);
  });

  bgmAudios[key] = audio;
}

function fadeOutBgmForVideo() {
  bgmSuppressedForVideo++;
  var keys = Object.keys(bgmAudios);
  if (!keys.length) return;
  keys.forEach(function(key) {
    var a = bgmAudios[key];
    if (!a) return;
    fadeOutAudio(a, function() {
      try { a.pause(); } catch (e) {}
    });
  });
}

function restoreBgmAfterVideo() {
  if (bgmSuppressedForVideo > 0) bgmSuppressedForVideo--;
  if (bgmSuppressedForVideo > 0) return;
  if (!shouldPlayBGM()) return;
  Object.keys(bgmAudios).forEach(function(key) {
    var a = bgmAudios[key];
    if (!a || a.ended) return;
    a.play().catch(function() {});
    fadeInAudio(a, bgmVolume, 500);
  });
}

function fadeOutAudio(audio, callback) {
  if (!audio || audio.volume === 0) {
    if (callback) callback();
    return;
  }
  if (audio.__fadeTimer) {
    clearInterval(audio.__fadeTimer);
    audio.__fadeTimer = null;
  }
  
  var startVol = audio.volume;
  var stepCount = bgmFadeOutDuration / 50;  // 50msй–“йҡ”
  var stepVol = startVol / stepCount;
  audio.__fadeTimer = setInterval(function() {
    audio.volume = Math.max(0, audio.volume - stepVol);
    if (audio.volume <= 0) {
      clearInterval(audio.__fadeTimer);
      audio.__fadeTimer = null;
      audio.volume = 0;
      if (callback) callback();
    }
  }, 50);
}

function fadeInAudio(audio, targetVol, duration) {
  if (!audio) return;
  if (audio.__fadeInTimer) {
    clearInterval(audio.__fadeInTimer);
    audio.__fadeInTimer = null;
  }
  if (audio.volume >= targetVol * 0.92) {
    audio.volume = targetVol;
    return;
  }
  var startVol = audio.volume;
  var stepCount = Math.max(1, duration / 50);
  var stepVol = (targetVol - startVol) / stepCount;
  audio.__fadeInTimer = setInterval(function() {
    if (audio.volume < targetVol) {
      audio.volume = Math.min(targetVol, audio.volume + stepVol);
    } else {
      clearInterval(audio.__fadeInTimer);
      audio.__fadeInTimer = null;
      audio.volume = targetVol;
    }
  }, 50);
}

function stopAllBGM(instant) {
  activeBgmCourse = null;
  Object.keys(bgmAudios).forEach(function(key) {
    if (instant) {
      try {
        bgmAudios[key].pause();
        bgmAudios[key].currentTime = 0;
      } catch (e) {}
      delete bgmAudios[key];
      return;
    }
    fadeOutAudio(bgmAudios[key], function() {
      bgmAudios[key].pause();
      delete bgmAudios[key];
    });
  });
}

function enableBGM() {
  bgmEnabled = true;
  localStorage.setItem('bgmEnabled', 'true');
  console.log('рҹҺө BGMжңүеҠ№еҢ–');
  if (currentSceneObj) playSceneBGM(currentSceneObj.data.id);
}

function disableBGM() {
  bgmEnabled = false;
  localStorage.setItem('bgmEnabled', 'false');
  // еј·еҲ¶еҶҚз”ҹдёӯгҒ§гҒӘгҒ‘гӮҢгҒ°еҒңжӯў
  if (!bgmForce) stopAllBGM();
  console.log('рҹ”Ү BGMз„ЎеҠ№еҢ–');
}

// гғҮгғҗгғғгӮ°пјҡеҲқжңҹгӮ·гғјгғіIDгӮ’зўәиӘҚ
console.log('рҹ”ө IIFEеӨ– urlParams:', urlParams.toString());
console.log('рҹ”ө IIFEеӨ– urlParams.get("id"):', urlParams.get('id'));
console.log('рҹ”ө About to call switchScene with id:', urlParams.get('id') || '0-aa001');

switchScene(urlParams.get('id') || '0-aa001');

}

/* iPadз”ЁпјҲviewer-ipad-fix.js гӮ’ HTML гҒ«еҶ…и”өгғ»еҲҘгғ•гӮЎгӮӨгғ«дёҚиҰҒпјү */
(function() {
  if (window.__viewerIpadFixLoaded) return;
  window.__viewerIpadFixLoaded = true;
  function isIosSafari() {
    var ua = navigator.userAgent || '';
    if (/iPad|iPhone|iPod/i.test(ua)) return true;
    if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return true;
    if (/CriOS|FxiOS|EdgiOS/i.test(ua)) return true;
    if (/Safari/i.test(ua) && !/Chrome|Chromium|Edg\//i.test(ua)) return true;
    return false;
  }
  if (!isIosSafari()) return;
  function mayPlayGuide(entry) {
    if (!entry || !entry.vid) return false;
    var vid = entry.vid;
    if (entry.guidePlaybackDone) return false;
    if (vid.loop !== true && vid.ended) return false;
    if (!vid.paused && vid.currentTime > 0.05) return false;
    return true;
  }
  function kick() {
    (window.sceneVideoEls || []).forEach(function(entry) {
      if (!mayPlayGuide(entry)) return;
      var vid = entry.vid;
      vid.muted = true;
      vid.playsInline = true;
      vid.setAttribute('playsinline', '');
      var p = vid.play();
      if (p && p.catch) p.catch(function() {});
    });
  }
  document.body.addEventListener('touchstart', kick, { passive: true });
  window.addEventListener('load', function() { setTimeout(kick, 400); });
})();

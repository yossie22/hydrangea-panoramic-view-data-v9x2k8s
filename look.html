<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>360° ビュー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="icon" href="vr-icon.ico" type="image/x-icon">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
#pano { position: absolute; inset: 0; }
#ui {
  position: fixed; z-index: 20; left: 0; right: 0; bottom: 0;
  display: flex; gap: 10px; justify-content: center; padding: 16px 14px 22px;
  pointer-events: none;
}
.btn {
  pointer-events: auto;
  border: none; border-radius: 999px; padding: 12px 18px;
  font-size: 15px; font-weight: bold; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.45);
}
#backBtn { background: rgba(255,255,255,0.92); color: #222; }
#gyroBtn { background: rgba(40,120,255,0.92); color: #fff; }
#gyroBtn.is-on { background: rgba(20,180,90,0.94); }
#hint {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 20; max-width: 92vw; padding: 8px 14px; border-radius: 999px;
  background: rgba(0,0,0,0.55); color: #eee; font-size: 13px; text-align: center;
  pointer-events: none; opacity: 0; transition: opacity 0.35s ease;
}
#hint.show { opacity: 1; }
#titleBar {
  position: fixed; top: 14px; left: 14px; z-index: 20;
  color: rgba(255,255,255,0.85); font-size: 13px; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  pointer-events: none;
}
</style>
<script src="vendor/marzipano.js"></script>
</head>
<body>
<div id="pano"></div>
<div id="titleBar"></div>
<div id="hint"></div>
<div id="ui">
  <button type="button" class="btn" id="backBtn">← 戻る</button>
  <button type="button" class="btn" id="gyroBtn">📱 ジャイロ</button>
</div>
<script>
(function() {
  'use strict';

  var urlParams = new URLSearchParams(window.location.search);
  var sceneId = urlParams.get('id') || '0-aa001';
  var backUrl = urlParams.get('back') || 'map.html';
  var initialYaw = urlParams.get('yaw');
  var initialPitch = urlParams.get('pitch');
  var autoGyro = urlParams.get('gyro') === '1';
  window.TILES_BASE = urlParams.get('tiles') || 'tiles1024';

  var hintEl = document.getElementById('hint');
  var titleEl = document.getElementById('titleBar');
  var gyroBtn = document.getElementById('gyroBtn');
  var hintTimer = null;

  function showHint(text, ms) {
    hintEl.textContent = text;
    hintEl.classList.add('show');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(function() { hintEl.classList.remove('show'); }, ms || 2600);
  }

  document.getElementById('backBtn').addEventListener('click', function() {
    try {
      location.href = new URL(backUrl, location.href).href;
    } catch (e) {
      location.href = 'map.html';
    }
  });

  function degToRad(d) { return d * Math.PI / 180; }
  function radToDeg(r) { return r * 180 / Math.PI; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function normalizeAngle(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a < -Math.PI) a += 2 * Math.PI;
    return a;
  }

  var viewer = null;
  var currentView = null;
  var gyroEnabled = false;
  var gyroHandler = null;
  var gyroBase = null;
  var gyroRaf = null;
  var gyroLatestEvent = null;
  var GYRO_SMOOTH = 0.16;

  function screenOrientationAngle() {
    if (window.screen && window.screen.orientation && window.screen.orientation.angle != null) {
      return window.screen.orientation.angle;
    }
    return window.orientation || 0;
  }

  function deviceTiltStep(e, prevBeta, prevGamma) {
    var beta = e.beta;
    var gamma = e.gamma;
    if (beta == null || gamma == null) return null;
    if (prevBeta == null || prevGamma == null) {
      return { stepYaw: 0, stepPitch: 0, beta: beta, gamma: gamma };
    }
    var dBeta = beta - prevBeta;
    var dGamma = gamma - prevGamma;
    var orient = screenOrientationAngle();
    var stepYaw;
    var stepPitch;
    // 方角（alpha）は使わない。傾き（beta/gamma）だけで追従 → 急回転を防ぐ
    if (orient === 90 || orient === -90 || orient === 270) {
      stepYaw = degToRad(dBeta);
      stepPitch = degToRad(-dGamma);
    } else {
      stepYaw = degToRad(dGamma);
      stepPitch = degToRad(-dBeta);
    }
    return { stepYaw: stepYaw, stepPitch: stepPitch, beta: beta, gamma: gamma };
  }

  function setGyroUi(on) {
    gyroEnabled = on;
    gyroBtn.textContent = on ? '📱 ジャイロ ON' : '📱 ジャイロ';
    gyroBtn.classList.toggle('is-on', on);
  }

  function stopGyro() {
    if (gyroHandler) {
      window.removeEventListener('deviceorientation', gyroHandler, true);
      gyroHandler = null;
    }
    if (gyroRaf) {
      cancelAnimationFrame(gyroRaf);
      gyroRaf = null;
    }
    gyroLatestEvent = null;
    gyroBase = null;
    setGyroUi(false);
  }

  function startGyro() {
    if (!currentView) return;
    gyroBase = {
      viewYaw: currentView.yaw(),
      viewPitch: currentView.pitch(),
      device: null
    };
    gyroLatestEvent = null;
    var displayYaw = currentView.yaw();
    var displayPitch = currentView.pitch();
    var prevBeta = null;
    var prevGamma = null;

    gyroHandler = function(e) {
      gyroLatestEvent = e;
    };
    window.addEventListener('deviceorientation', gyroHandler, true);

    function tick() {
      if (!gyroEnabled || !currentView) return;
      gyroRaf = requestAnimationFrame(tick);
      if (!gyroLatestEvent) return;
      var step = deviceTiltStep(gyroLatestEvent, prevBeta, prevGamma);
      if (!step) return;
      if (prevBeta === null) {
        prevBeta = step.beta;
        prevGamma = step.gamma;
        displayYaw = gyroBase.viewYaw;
        displayPitch = gyroBase.viewPitch;
        return;
      }
      prevBeta = step.beta;
      prevGamma = step.gamma;
      if (Math.abs(step.stepYaw) > 0.45 || Math.abs(step.stepPitch) > 0.45) return;
      displayYaw = normalizeAngle(displayYaw + GYRO_SMOOTH * step.stepYaw);
      displayPitch = clamp(displayPitch + GYRO_SMOOTH * step.stepPitch, -Math.PI / 2, Math.PI / 2);
      currentView.setYaw(displayYaw);
      currentView.setPitch(displayPitch);
    }
    gyroRaf = requestAnimationFrame(tick);
    setGyroUi(true);
    showHint('端末を傾けて見回してください');
  }

  function requestGyroPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(function(state) {
          if (state === 'granted') startGyro();
          else showHint('ジャイロの許可が必要です（設定→Safari）');
        })
        .catch(function() { showHint('ジャイロを開始できませんでした'); });
      return;
    }
    startGyro();
  }

  gyroBtn.addEventListener('click', function() {
    if (gyroEnabled) {
      stopGyro();
      showHint('指でドラッグして見回せます');
      return;
    }
    requestGyroPermission();
  });

  function normalizeLevels(scenes) {
    scenes.forEach(function(scene) {
      scene.levels = scene.levels.filter(function(l) { return l.size <= 1024; });
      scene.levels.forEach(function(l) {
        if (!l.fallbackOnly) l.tileSize = l.size;
      });
    });
  }

  function boot(data) {
    var sd = (data.scenes || []).find(function(s) { return s.id === sceneId; });
    if (!sd) {
      alert('シーンが見つかりません: ' + sceneId);
      return;
    }

    document.title = (data.tourTitle || '360°') + ' — ' + (sd.name || sceneId);
    titleEl.textContent = sd.name || sceneId;

    normalizeLevels(data.scenes);

    var panoEl = document.getElementById('pano');
    viewer = new Marzipano.Viewer(panoEl);
    var tilesBase = window.TILES_BASE;
    var source = Marzipano.ImageUrlSource.fromString(tilesBase + '/' + sd.id + '/{z}/{f}/{y}/{x}.jpg');
    var geometry = new Marzipano.CubeGeometry(sd.levels);
    var limiter = Marzipano.RectilinearView.limit.traditional(sd.faceSize, 75 * Math.PI / 180, 120 * Math.PI / 180);
    var params = Object.assign({}, sd.initialViewParameters || {});
    if (initialYaw != null && initialYaw !== '') params.yaw = degToRad(parseFloat(initialYaw));
    if (initialPitch != null && initialPitch !== '') params.pitch = degToRad(parseFloat(initialPitch));
    currentView = new Marzipano.RectilinearView(params, limiter);
    var scene = viewer.createScene({ source: source, geometry: geometry, view: currentView });
    scene.switchTo();

    showHint('指ドラッグで360°｜ジャイロボタンで傾けて見る');
    if (autoGyro) requestGyroPermission();
  }

  function loadDataAndBoot() {
    fetch('data.js?_=' + Date.now(), { cache: 'no-store' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(text) {
        var fn = new Function(text + '\n;return typeof APP_DATA !== "undefined" ? APP_DATA : null;');
        var data = fn();
        if (!data) throw new Error('APP_DATA なし');
        boot(data);
      })
      .catch(function(err) {
        console.error(err);
        alert('data.js の読み込みに失敗しました');
      });
  }

  loadDataAndBoot();
})();
</script>
</body>
</html>
